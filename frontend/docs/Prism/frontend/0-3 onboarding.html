<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Onboarding</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w006: rgba(255,255,255,0.06);
      --w012: rgba(255,255,255,0.12);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w045: rgba(255,255,255,0.45);
      --w06: rgba(255,255,255,0.6);
      --w09: rgba(255,255,255,0.9);
      --green: #5DCAA5;
      --amber: #FAC775;
      --coral: #F0997B;
      --mono: "SF Mono", Menlo, "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w09);
      font-family: var(--mono);
    }
    button { border: 0; color: inherit; font: inherit; cursor: pointer; }
    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
      isolation: isolate;
    }
    .status {
      height: 46px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.94);
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.3em;
    }
    .slides {
      position: absolute;
      inset: 46px 0 96px;
      display: flex;
      transition: transform 260ms ease;
      transform: translateX(calc(var(--index) * -375px));
    }
    .slide {
      width: 375px;
      flex: 0 0 375px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 18px;
      padding: 0 34px;
      text-align: center;
    }
    .diagram {
      position: relative;
      width: 158px;
      height: 210px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      overflow: hidden;
    }
    .diagram::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,0.13), transparent 26%),
        linear-gradient(150deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
    }
    .reticle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45%;
      width: 96px;
      height: 96px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    .lens-dot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      border: 1px solid var(--green);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 24px rgba(93,202,165,0.12);
    }
    .note {
      position: absolute;
      left: 72px;
      top: 62px;
      color: var(--w06);
      font-size: 10px;
    }
    .note::before {
      content: "";
      position: absolute;
      left: -42px;
      top: 7px;
      width: 34px;
      height: 1px;
      background: var(--w06);
      transform: rotate(-18deg);
    }
    h1 {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 18px;
      font-weight: 500;
    }
    p {
      max-width: 260px;
      margin: 0;
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      line-height: 1.55;
    }
    .controls {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 24px;
      display: grid;
      grid-template-columns: 80px 1fr 116px;
      align-items: center;
      gap: 12px;
    }
    .navbtn,
    .start {
      height: 42px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.12em;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
    }
    .dots i {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--w012);
    }
    .dots i.is-active { background: var(--w06); }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 40;
      padding: 9px 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 430px) {
      body { place-items: start center; padding-top: 10px; }
      .reset-demo { top: auto; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>
  <main class="phone" aria-label="世界观透镜新用户引导页" style="--index: 0;">
    <header class="status"><span>ONBOARDING</span><span>01/03</span></header>
    <section class="slides">
      <article class="slide">
        <div class="diagram reticle" aria-hidden="true"></div>
        <h1>拍下你看到的</h1>
        <p>举起这台观察仪器，记录一个真实的现场。</p>
      </article>
      <article class="slide">
        <div class="diagram" aria-hidden="true"><div class="lens-dot"></div></div>
        <h1>选一副镜片</h1>
        <p>让博物学家、宋代文人或废墟考古者替你重新看它。</p>
      </article>
      <article class="slide">
        <div class="diagram" aria-hidden="true"><span class="note">FIELD NOTE</span></div>
        <h1>世界被重新讲述</h1>
        <p>AI 会把画面拆成标注、线索与一枚可收藏的认知切片。</p>
      </article>
    </section>
    <footer class="controls">
      <button class="navbtn prev" type="button">PREV</button>
      <div class="dots"><i class="is-active"></i><i></i><i></i></div>
      <button class="start" type="button">NEXT</button>
    </footer>
    <div class="toast" role="status" aria-live="polite"></div>
  </main>
  <script>
    const phone = document.querySelector(".phone");
    const title = document.querySelector(".status span:last-child");
    const dots = Array.from(document.querySelectorAll(".dots i"));
    const prev = document.querySelector(".prev");
    const next = document.querySelector(".start");
    const reset = document.querySelector(".reset-demo");
    const toast = document.querySelector(".toast");
    let index = 0;
    let timer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }
    function render() {
      phone.style.setProperty("--index", index);
      title.textContent = `0${index + 1}/03`;
      dots.forEach((dot, i) => dot.classList.toggle("is-active", i === index));
      next.textContent = index === 2 ? "START" : "NEXT";
    }
    prev.addEventListener("click", () => { index = Math.max(0, index - 1); render(); });
    next.addEventListener("click", () => {
      if (index === 2) showToast("进入收藏页");
      else { index += 1; render(); }
    });
    reset.addEventListener("click", () => { index = 0; render(); showToast("RESET COMPLETE"); });
  </script>
</body>
</html>
