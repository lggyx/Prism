<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Collection Filter Empty</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w006: rgba(255,255,255,0.06);
      --w012: rgba(255,255,255,0.12);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w045: rgba(255,255,255,0.45);
      --w06: rgba(255,255,255,0.6);
      --w09: rgba(255,255,255,0.9);
      --green: #5DCAA5;
      --gray: #B4B2A9;
      --amber: #FAC775;
      --coral: #F0997B;
      --mono: "SF Mono", Menlo, "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w09);
      font-family: var(--mono);
    }
    button { border: 0; color: inherit; font: inherit; cursor: pointer; }
    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
    }
    .status {
      height: 46px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.94);
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.3em;
    }
    .filters {
      height: 52px;
      overflow-x: auto;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.88);
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .row {
      position: relative;
      min-width: 510px;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }
    .filter {
      position: relative;
      height: 52px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      background: transparent;
      color: var(--w025);
      font-size: 10px;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .filter + .filter::before {
      content: "|";
      position: absolute;
      left: -2px;
      color: var(--w012);
    }
    .filter.is-active { color: var(--w09); }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--dot);
    }
    .indicator {
      position: absolute;
      left: 215px;
      bottom: 0;
      width: 50px;
      height: 2px;
      background: var(--w09);
    }
    .empty {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 112px;
      bottom: 88px;
      display: grid;
      justify-items: center;
      align-content: center;
      text-align: center;
    }
    .frame {
      width: 86px;
      height: 116px;
      border: 1px dashed var(--w012);
      border-radius: 4px;
      position: relative;
      margin-bottom: 18px;
    }
    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      top: 20px;
      bottom: 20px;
      width: 3px;
      background: repeating-linear-gradient(var(--w006) 0 3px, transparent 3px 18px);
    }
    .frame::before { left: 6px; }
    .frame::after { right: 6px; }
    h1 {
      margin: 0;
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      font-weight: 400;
    }
    p {
      margin: 8px 0 0;
      color: var(--w025);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 12px;
    }
    .begin {
      height: 42px;
      margin-top: 24px;
      padding: 0 14px;
      border: 0.5px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 12px;
      letter-spacing: 0.1em;
    }
    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      border-top: 1px solid var(--w006);
      background: var(--panel);
    }
    .tab {
      position: relative;
      height: 68px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      background: transparent;
      color: var(--w025);
      font-size: 9px;
      letter-spacing: 0.06em;
    }
    .tab.is-active { color: var(--w09); }
    .tab.is-active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 18px;
      height: 2px;
      background: var(--w09);
      transform: translateX(-50%);
    }
    .tab-icon {
      width: 17px;
      height: 17px;
      display: grid;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 3px;
      font-size: 10px;
    }
    .capture-icon {
      width: 28px;
      height: 28px;
      border: 1px solid currentColor;
      border-radius: 4px;
      display: grid;
      place-items: center;
    }
    .capture-icon::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 1px solid currentColor;
      border-radius: 50%;
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 40;
      padding: 9px 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 430px) {
      body { place-items: start center; padding-top: 10px; }
      .reset-demo { top: auto; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>
  <main class="phone" aria-label="收藏页筛选无结果状态">
    <header class="status"><span>COLLECTION</span><span>0 FILTERED</span></header>
    <nav class="filters">
      <div class="row">
        <button class="filter" type="button">ALL</button>
        <button class="filter" type="button"><span class="dot" style="--dot: var(--green);"></span>博物学家</button>
        <button class="filter is-active" type="button"><span class="dot" style="--dot: var(--gray);"></span>都市倦怠</button>
        <button class="filter" type="button"><span class="dot" style="--dot: var(--amber);"></span>宋代文人</button>
        <button class="filter" type="button"><span class="dot" style="--dot: var(--coral);"></span>废墟考古</button>
        <span class="indicator"></span>
      </div>
    </nav>
    <section class="empty">
      <div class="frame" aria-hidden="true"></div>
      <h1>该镜片下暂无切片</h1>
      <p>换一副镜片筛选，或用它拍下第一张。</p>
      <button class="begin" type="button">CAPTURE WITH THIS LENS</button>
    </section>
    <nav class="tabbar" aria-label="底部导航">
      <button class="tab is-active" type="button" data-tab="COLLECT"><span class="tab-icon">▱</span><span>COLLECT</span></button>
      <button class="tab" type="button" data-tab="LENSES"><span class="tab-icon">◇</span><span>LENSES</span></button>
      <button class="tab" type="button" data-tab="CAPTURE"><span class="capture-icon"></span><span>CAPTURE</span></button>
      <button class="tab" type="button" data-tab="DISCOVER"><span class="tab-icon">⌖</span><span>DISCOVER</span></button>
      <button class="tab" type="button" data-tab="PROFILE"><span class="tab-icon">⌁</span><span>PROFILE</span></button>
    </nav>
    <div class="toast" role="status" aria-live="polite"></div>
  </main>
  <script>
    const toast = document.querySelector(".toast");
    const buttons = Array.from(document.querySelectorAll("button"));
    let timer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }
    buttons.forEach((button) => button.addEventListener("click", () => showToast(button.textContent.includes("CAPTURE") ? "打开取景页" : "RESET COMPLETE")));
  </script>
</body>
</html>
