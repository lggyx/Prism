<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Collection Empty</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w006: rgba(255,255,255,0.06);
      --w012: rgba(255,255,255,0.12);
      --w015: rgba(255,255,255,0.15);
      --w02: rgba(255,255,255,0.2);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w045: rgba(255,255,255,0.45);
      --w06: rgba(255,255,255,0.6);
      --w09: rgba(255,255,255,0.9);
      --mono: "SF Mono", Menlo, "Courier New", monospace;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w09);
      font-family: var(--mono);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 80;
      padding: 8px 10px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid var(--w015);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
      isolation: isolate;
    }

    .status {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 10;
      height: 46px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.94);
    }

    .status span {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.3em;
    }

    .filters {
      position: absolute;
      left: 0;
      right: 0;
      top: 46px;
      z-index: 10;
      height: 52px;
      overflow-x: auto;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.88);
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-row {
      min-width: 510px;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .filter {
      position: relative;
      height: 52px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      background: transparent;
      color: var(--w012);
      font-size: 10px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      cursor: default;
      pointer-events: none;
    }

    .filter + .filter::before {
      content: "|";
      position: absolute;
      left: -2px;
      color: rgba(255,255,255,0.08);
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--w012);
    }

    .empty {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 112px;
      bottom: 88px;
      display: grid;
      justify-items: center;
      align-content: center;
      text-align: center;
    }

    .large-lens {
      position: relative;
      width: 80px;
      height: 80px;
      border: 1px solid var(--w006);
      border-radius: 50%;
      animation: lensWait 60s linear infinite;
    }

    .large-lens::before,
    .large-lens::after {
      content: "";
      position: absolute;
      background: var(--w006);
    }

    .large-lens::before {
      left: 50%;
      top: 8px;
      bottom: 8px;
      width: 1px;
      transform: translateX(-50%);
    }

    .large-lens::after {
      left: 8px;
      right: 8px;
      top: 50%;
      height: 1px;
      transform: translateY(-50%);
    }

    .large-ring {
      position: absolute;
      inset: 17px;
      border: 1px solid var(--w006);
      border-radius: 50%;
    }

    @keyframes lensWait {
      to { transform: rotate(360deg); }
    }

    .empty-title {
      margin: 16px 0 0;
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 14px;
      font-weight: 400;
    }

    .empty-subtitle {
      margin: 8px 0 0;
      color: var(--w025);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 12px;
    }

    .begin {
      height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-top: 24px;
      padding: 0 14px;
      border: 0.5px solid var(--w02);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    .mini-lens {
      position: relative;
      width: 12px;
      height: 12px;
      border: 1px solid currentColor;
      border-radius: 50%;
      opacity: 0.75;
    }

    .mini-lens::before,
    .mini-lens::after {
      content: "";
      position: absolute;
      background: currentColor;
    }

    .mini-lens::before {
      left: 50%;
      top: 2px;
      bottom: 2px;
      width: 1px;
      transform: translateX(-50%);
    }

    .mini-lens::after {
      left: 2px;
      right: 2px;
      top: 50%;
      height: 1px;
      transform: translateY(-50%);
    }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      border-top: 1px solid var(--w006);
      background: var(--panel);
    }

    .tab {
      position: relative;
      height: 68px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      background: transparent;
      color: var(--w025);
      font-size: 9px;
      letter-spacing: 0.06em;
    }

    .tab.is-active { color: var(--w09); }

    .tab.is-active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 18px;
      height: 2px;
      background: var(--w09);
      transform: translateX(-50%);
    }

    .tab-icon {
      width: 17px;
      height: 17px;
      display: grid;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 3px;
      font-size: 10px;
    }

    .capture-icon {
      width: 28px;
      height: 28px;
      border: 1px solid currentColor;
      border-radius: 4px;
      display: grid;
      place-items: center;
    }

    .capture-icon::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 1px solid currentColor;
      border-radius: 50%;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 70;
      padding: 9px 12px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 430px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }

      .reset-demo {
        top: auto;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>

  <main class="phone" aria-label="世界观透镜收藏页空状态">
    <header class="status">
      <span>COLLECTION</span>
      <span>0 SLICES</span>
    </header>

    <nav class="filters" aria-label="镜片筛选，当前无内容">
      <div class="filter-row">
        <button class="filter" type="button">ALL</button>
        <button class="filter" type="button"><span class="dot"></span>博物学家</button>
        <button class="filter" type="button"><span class="dot"></span>都市倦怠</button>
        <button class="filter" type="button"><span class="dot"></span>宋代文人</button>
        <button class="filter" type="button"><span class="dot"></span>废墟考古</button>
      </div>
    </nav>

    <section class="empty" aria-label="空状态">
      <div class="large-lens" aria-hidden="true"><div class="large-ring"></div></div>
      <h1 class="empty-title">还没有认知切片</h1>
      <p class="empty-subtitle">拍下第一张照片，开始收藏你的视角</p>
      <button class="begin" type="button"><span class="mini-lens" aria-hidden="true"></span><span>BEGIN OBSERVATION</span></button>
    </section>

    <nav class="tabbar" aria-label="底部导航">
      <button class="tab is-active" type="button" data-tab="COLLECT"><span class="tab-icon">▱</span><span>COLLECT</span></button>
      <button class="tab" type="button" data-tab="LENSES"><span class="tab-icon">◇</span><span>LENSES</span></button>
      <button class="tab" type="button" data-tab="CAPTURE"><span class="capture-icon"></span><span>CAPTURE</span></button>
      <button class="tab" type="button" data-tab="DISCOVER"><span class="tab-icon">⌖</span><span>DISCOVER</span></button>
      <button class="tab" type="button" data-tab="PROFILE"><span class="tab-icon">⌁</span><span>PROFILE</span></button>
    </nav>

    <div class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const begin = document.querySelector(".begin");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const reset = document.querySelector(".reset-demo");
    const toast = document.querySelector(".toast");
    let toastTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    begin.addEventListener("click", () => showToast("打开取景页"));

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("is-active"));
        tab.classList.add("is-active");
        const name = tab.dataset.tab;
        showToast(name === "CAPTURE" ? "打开取景页" : `跳转到 ${name}`);
      });
    });

    reset.addEventListener("click", () => {
      tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.tab === "COLLECT"));
      showToast("RESET COMPLETE");
    });
  </script>
</body>
</html>
