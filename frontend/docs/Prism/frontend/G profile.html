<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Observer Profile</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w004: rgba(255,255,255,0.04);
      --w006: rgba(255,255,255,0.06);
      --w015: rgba(255,255,255,0.15);
      --w025: rgba(255,255,255,0.25);
      --w03: rgba(255,255,255,0.3);
      --w035: rgba(255,255,255,0.35);
      --w04: rgba(255,255,255,0.4);
      --w05: rgba(255,255,255,0.5);
      --w06: rgba(255,255,255,0.6);
      --w07: rgba(255,255,255,0.7);
      --w085: rgba(255,255,255,0.85);
      --w09: rgba(255,255,255,0.9);
      --green: #79a979;
      --gray: #8d929b;
      --amber: #c79a4d;
      --coral: #d9796b;
      --toggle: #5f9b6a;
      --danger: rgba(255,100,100,0.6);
      --mono: "SF Mono", Menlo, "Courier New", monospace;
      --ease: cubic-bezier(0.18, 0.9, 0.24, 1);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w09);
      font-family: var(--mono);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 80;
      padding: 8px 10px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid var(--w015);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
      isolation: isolate;
    }

    .status {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 12;
      height: 46px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.96);
    }

    .status span {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.3em;
    }

    .scroll {
      position: absolute;
      inset: 46px 0 68px;
      overflow-y: auto;
      padding: 14px 16px 22px;
      scrollbar-width: none;
    }

    .scroll::-webkit-scrollbar { display: none; }

    .identity {
      height: 98px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 6px;
      border-bottom: 1px solid var(--w006);
      margin-bottom: 18px;
    }

    .hex {
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      color: var(--w05);
      font-size: 20px;
      border: 0.5px solid var(--w015);
      clip-path: polygon(25% 4%, 75% 4%, 100% 50%, 75% 96%, 25% 96%, 0 50%);
      background: rgba(255,255,255,0.018);
    }

    .observer-id {
      color: var(--w06);
      font-size: 12px;
      letter-spacing: 0.12em;
    }

    .active-since {
      color: var(--w025);
      font-size: 10px;
      letter-spacing: 0.1em;
    }

    .module { margin-bottom: 22px; }

    .module-title,
    .sub-title {
      margin: 0 0 10px;
      color: var(--w035);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .stat {
      min-height: 70px;
      display: grid;
      align-content: center;
      gap: 8px;
      padding: 12px;
      border: 0.5px solid var(--w006);
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      text-align: left;
      transition: border-color 100ms ease, box-shadow 100ms ease;
    }

    .stat.is-hot {
      border-color: var(--w035);
      box-shadow: 0 0 0 1px var(--w015);
    }

    .stat-number {
      color: var(--w085);
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .stat-label {
      color: var(--w03);
      font-size: 9px;
      letter-spacing: 0.1em;
    }

    .distribution {
      margin-bottom: 18px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 88px 1fr 28px;
      gap: 8px;
      align-items: center;
      min-height: 24px;
      background: transparent;
      text-align: left;
      transition: opacity 120ms ease;
    }

    .bar-row.is-focus .fill {
      opacity: 1;
      box-shadow: 0 0 12px color-mix(in srgb, var(--bar-color), transparent 70%);
    }

    .bar-name {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--w05);
      font-size: 10px;
      white-space: nowrap;
    }

    .dot {
      width: 4px;
      height: 4px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--dot);
    }

    .track {
      height: 4px;
      background: var(--w004);
      overflow: hidden;
    }

    .fill {
      width: var(--bar-width);
      height: 4px;
      background: var(--bar-color);
      opacity: 0.6;
      transition: opacity 120ms ease, box-shadow 120ms ease;
    }

    .bar-count {
      color: var(--w03);
      font-size: 10px;
      text-align: right;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(7, 16px);
      gap: 4px;
      align-items: center;
    }

    .day {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      background: var(--level);
      transition: box-shadow 100ms ease, transform 100ms ease;
    }

    .day:active,
    .day.is-hot {
      transform: scale(1.1);
      box-shadow: 0 0 0 1px var(--w015);
    }

    .weekday {
      color: var(--w025);
      font-size: 8px;
      text-align: center;
    }

    .activity-labels {
      display: grid;
      grid-template-columns: repeat(7, 16px);
      gap: 4px;
      margin-top: 6px;
    }

    .config {
      border: 1px solid var(--w006);
      border-radius: 4px;
      background: rgba(255,255,255,0.02);
    }

    .setting {
      width: 100%;
      min-height: 50px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-bottom: 1px solid var(--w006);
      background: transparent;
      text-align: left;
    }

    .setting:last-child { border-bottom: 0; }

    .setting.is-disabled {
      opacity: 0.32;
      pointer-events: none;
    }

    .setting-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .setting svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: var(--w04);
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .setting-name {
      color: var(--w07);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 13px;
      white-space: nowrap;
    }

    .setting.signout .setting-name {
      color: var(--danger);
    }

    .value {
      color: var(--w05);
      font-size: 10px;
      letter-spacing: 0.12em;
      transition: opacity 120ms ease;
    }

    .value.is-fading { opacity: 0; }

    .arrow {
      color: var(--w025);
      font-size: 18px;
      line-height: 1;
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      border-radius: 999px;
      background: var(--w006);
      transition: background 150ms ease;
    }

    .toggle::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--w06);
      transition: transform 150ms var(--ease), background 150ms ease;
    }

    .toggle.is-on {
      background: color-mix(in srgb, var(--toggle), transparent 35%);
    }

    .toggle.is-on::before {
      transform: translateX(14px);
      background: var(--w09);
    }

    .version {
      margin: 22px 0 2px;
      color: var(--w015);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      border-top: 1px solid var(--w006);
      background: var(--panel);
    }

    .tab {
      position: relative;
      height: 68px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      background: transparent;
      color: var(--w025);
      font-size: 9px;
      letter-spacing: 0.06em;
    }

    .tab.is-active { color: var(--w09); }

    .tab.is-active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 18px;
      height: 2px;
      background: var(--w09);
      transform: translateX(-50%);
    }

    .tab-icon {
      width: 17px;
      height: 17px;
      display: grid;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 3px;
      font-size: 10px;
    }

    .capture-icon {
      width: 28px;
      height: 28px;
      border: 1px solid currentColor;
      border-radius: 4px;
      display: grid;
      place-items: center;
    }

    .capture-icon::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 1px solid currentColor;
      border-radius: 50%;
    }

    .sheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 58;
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(10,12,16,0.94);
      opacity: 0;
      transform: translateY(112%);
      transition: opacity 220ms ease, transform 220ms var(--ease);
      pointer-events: none;
    }

    .sheet.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .sheet-title {
      color: var(--w07);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-align: center;
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sheet button {
      height: 42px;
      border: 1px solid var(--w006);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w07);
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .sheet .danger {
      color: var(--danger);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 70;
      padding: 9px 12px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w07);
      font-size: 10px;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 430px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }

      .reset-demo {
        top: auto;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>

  <main class="phone" aria-label="世界观透镜个人页">
    <header class="status">
      <span>OBSERVER PROFILE</span>
      <span>OBS-0001</span>
    </header>

    <section class="scroll">
      <section class="identity" aria-label="观察者身份">
        <div class="hex">01</div>
        <div class="observer-id">OBS-0001</div>
        <div class="active-since">ACTIVE SINCE 2026.05.10</div>
      </section>

      <section class="module">
        <h2 class="module-title">SYSTEM STATUS</h2>
        <div class="stats-grid">
          <button class="stat" type="button" data-toast="12 cognitive slices collected"><span class="stat-number">12</span><span class="stat-label">SLICES</span></button>
          <button class="stat" type="button" data-toast="4 worldview lenses activated"><span class="stat-number">4</span><span class="stat-label">LENSES USED</span></button>
          <button class="stat" type="button" data-toast="6 observation locations recorded"><span class="stat-number">6</span><span class="stat-label">LOCATIONS</span></button>
          <button class="stat" type="button" data-toast="23 resonance signals received"><span class="stat-number">23</span><span class="stat-label">RESONANCE</span></button>
        </div>

        <section class="distribution">
          <h3 class="sub-title">LENS DISTRIBUTION</h3>
          <button class="bar-row" type="button" data-toast="博物学家: 5 slices" style="--bar-color: var(--green); --bar-width: 100%;">
            <span class="bar-name"><span class="dot" style="--dot: var(--green);"></span>博物学家</span><span class="track"><span class="fill"></span></span><span class="bar-count">5</span>
          </button>
          <button class="bar-row" type="button" data-toast="都市倦怠: 3 slices" style="--bar-color: var(--gray); --bar-width: 60%;">
            <span class="bar-name"><span class="dot" style="--dot: var(--gray);"></span>都市倦怠</span><span class="track"><span class="fill"></span></span><span class="bar-count">3</span>
          </button>
          <button class="bar-row" type="button" data-toast="宋代文人: 2 slices" style="--bar-color: var(--amber); --bar-width: 40%;">
            <span class="bar-name"><span class="dot" style="--dot: var(--amber);"></span>宋代文人</span><span class="track"><span class="fill"></span></span><span class="bar-count">2</span>
          </button>
          <button class="bar-row" type="button" data-toast="废墟考古: 2 slices" style="--bar-color: var(--coral); --bar-width: 40%;">
            <span class="bar-name"><span class="dot" style="--dot: var(--coral);"></span>废墟考古</span><span class="track"><span class="fill"></span></span><span class="bar-count">2</span>
          </button>
        </section>

        <section class="activity">
          <h3 class="sub-title">ACTIVITY</h3>
          <div class="activity-grid">
            <button class="day" type="button" data-toast="MON · 0 slices" style="--level: var(--w004);"></button>
            <button class="day" type="button" data-toast="TUE · 2 slices" style="--level: var(--w03);"></button>
            <button class="day" type="button" data-toast="WED · 1 slice" style="--level: var(--w015);"></button>
            <button class="day" type="button" data-toast="THU · 0 slices" style="--level: var(--w004);"></button>
            <button class="day" type="button" data-toast="FRI · 3 slices" style="--level: var(--w05);"></button>
            <button class="day" type="button" data-toast="SAT · 1 slice" style="--level: var(--w015);"></button>
            <button class="day" type="button" data-toast="SUN · 2 slices" style="--level: var(--w03);"></button>
          </div>
          <div class="activity-labels"><span class="weekday">M</span><span class="weekday">T</span><span class="weekday">W</span><span class="weekday">T</span><span class="weekday">F</span><span class="weekday">S</span><span class="weekday">S</span></div>
        </section>
      </section>

      <section class="module">
        <h2 class="module-title">CONFIGURATION</h2>
        <div class="config">
          <button class="setting" type="button" data-setting="location">
            <span class="setting-left"><svg viewBox="0 0 24 24"><path d="M12 21s7-5.2 7-11a7 7 0 0 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg><span class="setting-name">Location in community</span></span>
            <span class="toggle is-on"></span>
          </button>
          <button class="setting" type="button" data-setting="precision">
            <span class="setting-left"><svg viewBox="0 0 24 24"><path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="2.5"/></svg><span class="setting-name">Location precision</span></span>
            <span class="value precision-value">CITY</span>
          </button>
          <button class="setting" type="button" data-setting="challenge">
            <span class="setting-left"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg><span class="setting-name">Challenge notifications</span></span>
            <span class="toggle is-on"></span>
          </button>
          <button class="setting" type="button" data-setting="theme">
            <span class="setting-left"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18h1a2 2 0 0 0 0-4h-1a2 2 0 0 1 0-4h2a7 7 0 0 0 0-10h-2Z"/><circle cx="7" cy="10" r="1"/><circle cx="10" cy="7" r="1"/><circle cx="15" cy="7" r="1"/></svg><span class="setting-name">Interface theme</span></span>
            <span class="value">DARK</span>
          </button>
          <button class="setting" type="button" data-setting="about">
            <span class="setting-left"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 8h.01"/></svg><span class="setting-name">About Worldview Lens</span></span>
            <span class="arrow">›</span>
          </button>
          <button class="setting signout" type="button" data-setting="signout">
            <span class="setting-left"><svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 19V5a2 2 0 0 0-2-2h-5"/></svg><span class="setting-name">Sign out</span></span>
            <span class="arrow">›</span>
          </button>
        </div>
      </section>

      <div class="version">WORLDVIEW LENS v0.1.0 · MVP</div>
    </section>

    <nav class="tabbar" aria-label="底部导航">
      <button class="tab" type="button" data-tab="COLLECT"><span class="tab-icon">▱</span><span>COLLECT</span></button>
      <button class="tab" type="button" data-tab="LENSES"><span class="tab-icon">◇</span><span>LENSES</span></button>
      <button class="tab" type="button" data-tab="CAPTURE"><span class="capture-icon"></span><span>CAPTURE</span></button>
      <button class="tab" type="button" data-tab="DISCOVER"><span class="tab-icon">⌖</span><span>DISCOVER</span></button>
      <button class="tab is-active" type="button" data-tab="PROFILE"><span class="tab-icon">⌁</span><span>PROFILE</span></button>
    </nav>

    <section class="sheet" aria-label="退出确认">
      <div class="sheet-title">CONFIRM SIGN OUT?</div>
      <div class="sheet-actions">
        <button type="button" data-confirm="cancel">CANCEL</button>
        <button class="danger" type="button" data-confirm="signout">SIGN OUT</button>
      </div>
    </section>

    <div class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const stats = Array.from(document.querySelectorAll(".stat"));
    const bars = Array.from(document.querySelectorAll(".bar-row"));
    const days = Array.from(document.querySelectorAll(".day"));
    const settings = Array.from(document.querySelectorAll(".setting"));
    const locationSetting = document.querySelector('[data-setting="location"]');
    const precisionSetting = document.querySelector('[data-setting="precision"]');
    const challengeSetting = document.querySelector('[data-setting="challenge"]');
    const precisionValue = document.querySelector(".precision-value");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const sheet = document.querySelector(".sheet");
    const resetButton = document.querySelector(".reset-demo");
    const toast = document.querySelector(".toast");

    const precisionModes = ["CITY", "DISTRICT", "OFF"];
    let precisionIndex = 0;
    let locationOn = true;
    let toastTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function flash(el, cls = "is-hot") {
      el.classList.add(cls);
      setTimeout(() => el.classList.remove(cls), 260);
    }

    function toggleSwitch(setting) {
      const toggle = setting.querySelector(".toggle");
      toggle.classList.toggle("is-on");
      return toggle.classList.contains("is-on");
    }

    function setLocationState(on) {
      locationOn = on;
      locationSetting.querySelector(".toggle").classList.toggle("is-on", on);
      precisionSetting.classList.toggle("is-disabled", !on);
      if (!on) {
        precisionValue.textContent = "OFF";
      } else {
        precisionValue.textContent = precisionModes[precisionIndex];
      }
    }

    stats.forEach((stat) => {
      stat.addEventListener("click", () => {
        flash(stat);
        showToast(stat.dataset.toast);
      });
    });

    bars.forEach((bar) => {
      bar.addEventListener("click", () => {
        bars.forEach((item) => item.classList.remove("is-focus"));
        bar.classList.add("is-focus");
        showToast(bar.dataset.toast);
        setTimeout(() => bar.classList.remove("is-focus"), 1200);
      });
    });

    days.forEach((day) => {
      day.addEventListener("click", () => {
        flash(day);
        showToast(day.dataset.toast);
      });
    });

    settings.forEach((setting) => {
      setting.addEventListener("click", () => {
        const key = setting.dataset.setting;
        if (key === "location") {
          setLocationState(!locationOn);
          showToast(locationOn ? "community location ON" : "community location OFF");
        }
        if (key === "challenge") {
          const on = toggleSwitch(challengeSetting);
          showToast(on ? "challenge notifications ON" : "challenge notifications OFF");
        }
        if (key === "precision") {
          precisionValue.classList.add("is-fading");
          setTimeout(() => {
            precisionIndex = (precisionIndex + 1) % precisionModes.length;
            precisionValue.textContent = precisionModes[precisionIndex];
            precisionValue.classList.remove("is-fading");
            showToast(`Location precision: ${precisionModes[precisionIndex]}`);
          }, 120);
        }
        if (key === "theme") showToast("更多主题即将推出");
        if (key === "about") showToast("Version 0.1.0 MVP");
        if (key === "signout") sheet.classList.add("is-open");
      });
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("is-active"));
        tab.classList.add("is-active");
        const name = tab.dataset.tab;
        showToast(name === "CAPTURE" ? "打开取景页" : `跳转到 ${name}`);
      });
    });

    sheet.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      if (button.dataset.confirm === "cancel") {
        sheet.classList.remove("is-open");
      } else {
        sheet.classList.remove("is-open");
        showToast("已退出");
      }
    });

    resetButton.addEventListener("click", () => {
      precisionIndex = 0;
      setLocationState(true);
      challengeSetting.querySelector(".toggle").classList.add("is-on");
      sheet.classList.remove("is-open");
      tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.tab === "PROFILE"));
      showToast("RESET COMPLETE");
    });
  </script>
</body>
</html>
