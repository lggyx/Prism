<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - 高科技底片收藏页</title>
  <style>
    :root {
      --page-bg: #0a0c10;
      --panel: #0d0f14;
      --text-006: rgba(255, 255, 255, 0.06);
      --text-015: rgba(255, 255, 255, 0.15);
      --text-025: rgba(255, 255, 255, 0.25);
      --text-035: rgba(255, 255, 255, 0.35);
      --text-05: rgba(255, 255, 255, 0.5);
      --text-07: rgba(255, 255, 255, 0.7);
      --text-09: rgba(255, 255, 255, 0.9);
      --green: #79a979;
      --gray: #8d929b;
      --amber: #c79a4d;
      --coral: #d9796b;
      --mono: "SF Mono", Menlo, "Courier New", monospace;
      --ease: cubic-bezier(0.18, 0.9, 0.24, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--page-bg);
      color: var(--text-09);
      font-family: var(--mono);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 80;
      padding: 8px 10px;
      border: 1px solid var(--text-015);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-05);
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid var(--text-015);
      border-radius: 6px;
      background:
        linear-gradient(var(--text-006) 1px, transparent 1px),
        linear-gradient(90deg, var(--text-006) 1px, transparent 1px),
        var(--page-bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.52);
      isolation: isolate;
    }

    .status {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 12;
      height: 46px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--text-006);
      background: rgba(10, 12, 16, 0.92);
    }

    .status span {
      color: var(--text-035);
      font-size: 10px;
      letter-spacing: 0.3em;
    }

    .filters {
      position: absolute;
      left: 0;
      right: 0;
      top: 46px;
      z-index: 12;
      height: 52px;
      overflow-x: auto;
      border-bottom: 1px solid var(--text-006);
      background: rgba(10, 12, 16, 0.88);
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter-row {
      position: relative;
      min-width: 510px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 16px;
    }

    .filter {
      position: relative;
      height: 52px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      background: transparent;
      color: rgba(255, 255, 255, 0.3);
      font-size: 10px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      transition: color 180ms ease;
    }

    .filter + .filter::before {
      content: "|";
      position: absolute;
      left: -2px;
      color: var(--text-015);
    }

    .filter.is-active {
      color: var(--text-09);
    }

    .lens-dot,
    .gps-dot {
      width: 4px;
      height: 4px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--dot);
    }

    .indicator {
      position: absolute;
      left: 16px;
      bottom: 0;
      width: 28px;
      height: 2px;
      background: var(--text-09);
      transform: translateX(0);
      transition: transform 200ms var(--ease), width 200ms var(--ease);
    }

    .viewport {
      position: absolute;
      left: 0;
      right: 0;
      top: 98px;
      bottom: 68px;
      overflow-y: auto;
      padding: 14px 16px 18px;
      scrollbar-width: none;
    }

    .viewport::-webkit-scrollbar {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 8px;
      opacity: 1;
      transition: opacity 150ms ease;
    }

    .grid.is-fading {
      opacity: 0.3;
    }

    .frame {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      padding: 8px 10px;
      border: 1px solid var(--text-006);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.018);
      text-align: left;
      transform-origin: center;
      transition: border-color 100ms ease, box-shadow 100ms ease, transform 100ms ease, opacity 150ms ease;
    }

    .frame.is-hidden {
      display: none;
    }

    .frame.is-armed {
      border-color: var(--text-035);
      box-shadow: 0 0 0 1px var(--text-015), 0 0 22px rgba(255, 255, 255, 0.08);
      transform: scale(1.015);
    }

    .perfs {
      position: absolute;
      top: 22px;
      bottom: 22px;
      width: 3px;
      display: grid;
      grid-template-rows: repeat(4, 3px);
      align-content: space-between;
      pointer-events: none;
    }

    .perfs.left { left: 3px; }
    .perfs.right { right: 3px; }

    .perfs i {
      width: 3px;
      height: 3px;
      display: block;
      background: var(--text-006);
    }

    .photo {
      position: relative;
      height: calc(100% - 52px);
      overflow: hidden;
      border: 1px solid var(--text-006);
      border-radius: 4px;
      background: var(--photo);
    }

    .photo::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.16), transparent 24%),
        radial-gradient(circle at 70% 62%, rgba(0, 0, 0, 0.24), transparent 30%),
        repeating-linear-gradient(90deg, transparent 0 19px, rgba(255, 255, 255, 0.025) 19px 20px);
      opacity: 0.78;
    }

    .date {
      position: absolute;
      left: 6px;
      top: 6px;
      z-index: 2;
      color: rgba(255, 255, 255, 0.3);
      font-size: 9px;
      letter-spacing: 0.08em;
    }

    .gps-dot {
      position: absolute;
      right: 7px;
      top: 8px;
      z-index: 2;
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
    }

    .meta {
      height: 52px;
      padding: 7px 0 0;
      background: rgba(255, 255, 255, 0.012);
    }

    .meta-lens {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.06em;
    }

    .meta-summary {
      margin: 7px 0 0;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.45);
      font-size: 11px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      border-top: 1px solid var(--text-006);
      background: var(--panel);
    }

    .tab {
      position: relative;
      height: 68px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      background: transparent;
      color: var(--text-025);
      font-size: 9px;
      letter-spacing: 0.06em;
    }

    .tab.is-active {
      color: var(--text-09);
    }

    .tab.is-active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 18px;
      height: 2px;
      background: var(--text-09);
      transform: translateX(-50%);
    }

    .icon {
      width: 17px;
      height: 17px;
      display: grid;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 3px;
      font-size: 10px;
      line-height: 1;
    }

    .capture-icon {
      width: 28px;
      height: 28px;
      border: 1px solid currentColor;
      border-radius: 4px;
      display: grid;
      place-items: center;
    }

    .capture-icon::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 1px solid currentColor;
      border-radius: 50%;
    }

    .detail {
      position: absolute;
      inset: 0;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease;
    }

    .detail.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail.is-closing {
      opacity: 1;
      pointer-events: none;
    }

    .detail-photo {
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: var(--detail-photo);
      transform: translate3d(var(--start-x), var(--start-y), 0) scale(var(--start-scale-x), var(--start-scale-y));
      transform-origin: top left;
      transition: transform 300ms var(--ease), border-radius 300ms var(--ease);
    }

    .detail.is-open .detail-photo {
      border-radius: 0;
      transform: translate3d(0, 0, 0) scale(1, 1);
    }

    .detail-photo::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.14), transparent 22%),
        repeating-linear-gradient(90deg, transparent 0 27px, rgba(255, 255, 255, 0.025) 27px 28px),
        rgba(0, 0, 0, 0.18);
    }

    .detail-back {
      position: absolute;
      top: 18px;
      left: 16px;
      z-index: 45;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--text-015);
      border-radius: 4px;
      background: rgba(10, 12, 16, 0.54);
      color: var(--text-07);
      font-size: 22px;
      opacity: 0;
      transition: opacity 150ms ease 130ms;
    }

    .detail.is-open .detail-back,
    .detail.is-open .notes,
    .detail.is-open .detail-panel {
      opacity: 1;
    }

    .notes {
      position: absolute;
      inset: 0;
      z-index: 44;
      opacity: 0;
      transition: opacity 150ms ease 150ms;
      pointer-events: none;
    }

    .note {
      position: absolute;
      color: var(--text-07);
      font-size: 11px;
      line-height: 1.35;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.8);
    }

    .note::before {
      content: "";
      position: absolute;
      left: -46px;
      top: 8px;
      width: 38px;
      height: 1px;
      background: var(--text-05);
      transform: rotate(-18deg);
      transform-origin: right center;
    }

    .note.one { left: 188px; top: 138px; width: 116px; }
    .note.two { left: 80px; top: 348px; width: 132px; }
    .note.three { left: 202px; top: 506px; width: 112px; }

    .detail-panel {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 16px;
      z-index: 45;
      display: grid;
      gap: 9px;
      padding: 12px;
      border: 1px solid var(--text-015);
      border-radius: 4px;
      background: rgba(8, 10, 14, 0.72);
      opacity: 0;
      transition: opacity 150ms ease 150ms;
    }

    .detail-lens {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-07);
      font-size: 10px;
      letter-spacing: 0.1em;
    }

    .detail-summary {
      margin: 0;
      color: var(--text-09);
      font-size: 13px;
      line-height: 1.45;
      letter-spacing: 0.04em;
    }

    .detail-data {
      color: var(--text-035);
      font-size: 10px;
      letter-spacing: 0.08em;
    }

    .sheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 55;
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--text-015);
      border-radius: 4px;
      background: rgba(10, 12, 16, 0.9);
      opacity: 0;
      transform: translateY(112%);
      transition: opacity 220ms ease, transform 220ms var(--ease);
      pointer-events: none;
    }

    .sheet.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .sheet button {
      height: 42px;
      border: 1px solid var(--text-006);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--text-07);
      font-size: 11px;
      letter-spacing: 0.14em;
    }

    .sheet .danger {
      color: rgba(255, 255, 255, 0.5);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 70;
      padding: 9px 12px;
      border: 1px solid var(--text-015);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.76);
      color: var(--text-07);
      font-size: 10px;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 430px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }

      .reset-demo {
        top: auto;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>

  <main class="phone" aria-label="世界观透镜高科技底片收藏页">
    <header class="status">
      <span>COLLECTION</span>
      <span>12 SLICES</span>
    </header>

    <nav class="filters" aria-label="镜片筛选">
      <div class="filter-row">
        <button class="filter is-active" type="button" data-filter="ALL">ALL</button>
        <button class="filter" type="button" data-filter="博物学家"><span class="lens-dot" style="--dot: var(--green);"></span>博物学家</button>
        <button class="filter" type="button" data-filter="都市倦怠"><span class="lens-dot" style="--dot: var(--gray);"></span>都市倦怠</button>
        <button class="filter" type="button" data-filter="宋代文人"><span class="lens-dot" style="--dot: var(--amber);"></span>宋代文人</button>
        <button class="filter" type="button" data-filter="废墟考古"><span class="lens-dot" style="--dot: var(--coral);"></span>废墟考古</button>
        <span class="indicator" aria-hidden="true"></span>
      </div>
    </nav>

    <section class="viewport" aria-label="底片网格">
      <div class="grid">
        <button class="frame" type="button" data-lens="博物学家" data-date="05.16" data-summary="街角的日常，也有被看见的价值。" data-coord="31.2304N | 121.4737E" style="--photo: linear-gradient(155deg, #355f63, #203c3b 50%, #121d20); --dot: var(--green);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.16</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--green);"></span>博物学家</span><span class="meta-summary">街角的日常，也有被看见的价值。</span></span>
        </button>

        <button class="frame" type="button" data-lens="都市倦怠" data-date="05.15" data-summary="每一步都是为了走到能停下的地方。" data-coord="31.2248N | 121.4772E" style="--photo: linear-gradient(155deg, #554c66, #302f3d 52%, #171b24); --dot: var(--gray);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.15</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--gray);"></span>都市倦怠</span><span class="meta-summary">每一步都是为了走到能停下的地方。</span></span>
        </button>

        <button class="frame" type="button" data-lens="宋代文人" data-date="05.14" data-summary="庭前落叶三两片，恰是秋意最浓时。" data-coord="30.2741N | 120.1551E" style="--photo: linear-gradient(150deg, #8b6c35, #4d3823 50%, #1f1a16); --dot: var(--amber);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.14</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--amber);"></span>宋代文人</span><span class="meta-summary">庭前落叶三两片，恰是秋意最浓时。</span></span>
        </button>

        <button class="frame" type="button" data-lens="博物学家" data-date="05.14" data-summary="城市缝隙中的微型生态正在自我修复。" data-coord="31.2192N | 121.4628E" style="--photo: linear-gradient(160deg, #607378, #34484b 48%, #17211f); --dot: var(--green);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.14</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--green);"></span>博物学家</span><span class="meta-summary">城市缝隙中的微型生态正在自我修复。</span></span>
        </button>

        <button class="frame" type="button" data-lens="废墟考古" data-date="05.13" data-summary="这面墙会比我们记得更多。" data-coord="39.9042N | 116.4074E" style="--photo: linear-gradient(145deg, #743d3d, #43242a 50%, #1c171d); --dot: var(--coral);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.13</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--coral);"></span>废墟考古</span><span class="meta-summary">这面墙会比我们记得更多。</span></span>
        </button>

        <button class="frame" type="button" data-lens="都市倦怠" data-date="05.12" data-summary="霓虹灯只对还没回家的人亮着。" data-coord="22.5431N | 114.0579E" style="--photo: linear-gradient(145deg, #243d66, #17253f 54%, #0f1724); --dot: var(--gray);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.12</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--gray);"></span>都市倦怠</span><span class="meta-summary">霓虹灯只对还没回家的人亮着。</span></span>
        </button>

        <button class="frame" type="button" data-lens="宋代文人" data-date="05.11" data-summary="一盏茶的功夫，足以安顿半日浮躁。" data-coord="32.0603N | 118.7969E" style="--photo: linear-gradient(150deg, #74583b, #463322 48%, #1e1814); --dot: var(--amber);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.11</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--amber);"></span>宋代文人</span><span class="meta-summary">一盏茶的功夫，足以安顿半日浮躁。</span></span>
        </button>

        <button class="frame" type="button" data-lens="废墟考古" data-date="05.10" data-summary="停车场的裂缝里长出了第一棵树。" data-coord="31.8206N | 117.2272E" style="--photo: linear-gradient(155deg, #56685b, #334137 52%, #1b1f1b); --dot: var(--coral);">
          <span class="perfs left"><i></i><i></i><i></i><i></i></span><span class="perfs right"><i></i><i></i><i></i><i></i></span>
          <span class="photo"><span class="date">05.10</span><span class="gps-dot"></span></span>
          <span class="meta"><span class="meta-lens"><span class="lens-dot" style="--dot: var(--coral);"></span>废墟考古</span><span class="meta-summary">停车场的裂缝里长出了第一棵树。</span></span>
        </button>
      </div>
    </section>

    <nav class="tabbar" aria-label="底部导航">
      <button class="tab is-active" type="button" data-tab="COLLECT"><span class="icon">▱</span><span>COLLECT</span></button>
      <button class="tab" type="button" data-tab="LENSES"><span class="icon">◇</span><span>LENSES</span></button>
      <button class="tab" type="button" data-tab="CAPTURE"><span class="capture-icon"></span><span>CAPTURE</span></button>
      <button class="tab" type="button" data-tab="DISCOVER"><span class="icon">⌖</span><span>DISCOVER</span></button>
      <button class="tab" type="button" data-tab="PROFILE"><span class="icon">⌁</span><span>PROFILE</span></button>
    </nav>

    <section class="detail" aria-label="切片详情">
      <div class="detail-photo"></div>
      <button class="detail-back" type="button" aria-label="返回">‹</button>
      <div class="notes" aria-hidden="true">
        <div class="note one">OBJECT TRACE</div>
        <div class="note two">VIEWPOINT MARK</div>
        <div class="note three">SAVED SLICE</div>
      </div>
      <div class="detail-panel">
        <div class="detail-lens"><span class="lens-dot"></span><span class="detail-lens-name"></span></div>
        <p class="detail-summary"></p>
        <div class="detail-data"></div>
      </div>
    </section>

    <section class="sheet" aria-label="操作面板">
      <button type="button" data-action="REANALYZE">REANALYZE</button>
      <button type="button" data-action="EXPORT">EXPORT</button>
      <button class="danger" type="button" data-action="DELETE">DELETE</button>
    </section>

    <div class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const phone = document.querySelector(".phone");
    const filterRow = document.querySelector(".filter-row");
    const filters = Array.from(document.querySelectorAll(".filter"));
    const indicator = document.querySelector(".indicator");
    const grid = document.querySelector(".grid");
    const frames = Array.from(document.querySelectorAll(".frame"));
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const detail = document.querySelector(".detail");
    const detailPhoto = document.querySelector(".detail-photo");
    const detailBack = document.querySelector(".detail-back");
    const detailLensDot = document.querySelector(".detail-lens .lens-dot");
    const detailLensName = document.querySelector(".detail-lens-name");
    const detailSummary = document.querySelector(".detail-summary");
    const detailData = document.querySelector(".detail-data");
    const sheet = document.querySelector(".sheet");
    const toast = document.querySelector(".toast");
    const resetButton = document.querySelector(".reset-demo");

    let toastTimer = null;
    let pressTimer = null;
    let longPressed = false;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function moveIndicator(target) {
      const rowBox = filterRow.getBoundingClientRect();
      const box = target.getBoundingClientRect();
      indicator.style.width = Math.max(18, box.width - 20) + "px";
      indicator.style.transform = `translateX(${box.left - rowBox.left + 10}px)`;
    }

    function applyFilter(value) {
      const target = filters.find((item) => item.dataset.filter === value) || filters[0];
      filters.forEach((filter) => filter.classList.toggle("is-active", filter === target));
      moveIndicator(target);
      grid.classList.add("is-fading");

      setTimeout(() => {
        frames.forEach((frame) => {
          const visible = value === "ALL" || frame.dataset.lens === value;
          frame.classList.toggle("is-hidden", !visible);
        });
        grid.classList.remove("is-fading");
      }, 150);
    }

    function openDetail(frame) {
      if (longPressed) return;
      frame.classList.add("is-armed");
      setTimeout(() => {
        frame.classList.remove("is-armed");
        const phoneBox = phone.getBoundingClientRect();
        const box = frame.getBoundingClientRect();
        detail.style.setProperty("--start-x", box.left - phoneBox.left + "px");
        detail.style.setProperty("--start-y", box.top - phoneBox.top + "px");
        detail.style.setProperty("--start-scale-x", box.width / 375);
        detail.style.setProperty("--start-scale-y", box.height / 812);
        detail.style.setProperty("--detail-photo", frame.style.getPropertyValue("--photo"));
        detailLensDot.style.setProperty("--dot", frame.style.getPropertyValue("--dot"));
        detailLensName.textContent = frame.dataset.lens;
        detailSummary.textContent = frame.dataset.summary;
        detailData.textContent = `${frame.dataset.date} | ${frame.dataset.coord}`;
        detail.offsetWidth;
        detail.classList.add("is-open");
      }, 100);
    }

    function closeDetail() {
      if (!detail.classList.contains("is-open")) return;
      detail.classList.add("is-closing");
      detail.classList.remove("is-open");
      setTimeout(() => {
        detail.classList.remove("is-closing");
      }, 320);
    }

    function startPress(frame) {
      longPressed = false;
      clearTimeout(pressTimer);
      pressTimer = setTimeout(() => {
        longPressed = true;
        frame.classList.add("is-armed");
        sheet.classList.add("is-open");
        setTimeout(() => frame.classList.remove("is-armed"), 160);
      }, 500);
    }

    function endPress() {
      clearTimeout(pressTimer);
      pressTimer = null;
    }

    function resetPage() {
      applyFilter("ALL");
      tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.tab === "COLLECT"));
      sheet.classList.remove("is-open");
      closeDetail();
      showToast("RESET COMPLETE");
    }

    filters.forEach((filter) => {
      filter.addEventListener("click", () => applyFilter(filter.dataset.filter));
    });

    frames.forEach((frame) => {
      frame.addEventListener("click", () => openDetail(frame));
      frame.addEventListener("pointerdown", () => startPress(frame));
      frame.addEventListener("pointerup", endPress);
      frame.addEventListener("pointerleave", endPress);
      frame.addEventListener("pointercancel", endPress);
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("is-active"));
        tab.classList.add("is-active");
        const name = tab.dataset.tab;
        showToast(name === "CAPTURE" ? "OPEN CAPTURE" : `JUMP TO ${name}`);
      });
    });

    sheet.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      sheet.classList.remove("is-open");
      showToast(button.dataset.action);
    });

    detailBack.addEventListener("click", closeDetail);
    resetButton.addEventListener("click", resetPage);
    window.addEventListener("load", () => moveIndicator(filters[0]));
  </script>
</body>
</html>
