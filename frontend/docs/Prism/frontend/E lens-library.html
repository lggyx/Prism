<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - 镜片库</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w006: rgba(255, 255, 255, 0.06);
      --w015: rgba(255, 255, 255, 0.15);
      --w025: rgba(255, 255, 255, 0.25);
      --w03: rgba(255, 255, 255, 0.3);
      --w035: rgba(255, 255, 255, 0.35);
      --w045: rgba(255, 255, 255, 0.45);
      --w06: rgba(255, 255, 255, 0.6);
      --w07: rgba(255, 255, 255, 0.7);
      --w085: rgba(255, 255, 255, 0.85);
      --w09: rgba(255, 255, 255, 0.9);
      --green: #79a979;
      --gray: #8d929b;
      --amber: #c79a4d;
      --coral: #d9796b;
      --blue: #6f93c9;
      --pink: #d58aaa;
      --mono: "SF Mono", Menlo, "Courier New", monospace;
      --ease: cubic-bezier(0.18, 0.9, 0.24, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w09);
      font-family: var(--mono);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 80;
      padding: 8px 10px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid var(--w015);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.52);
      isolation: isolate;
    }

    .status {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      height: 46px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10, 12, 16, 0.94);
    }

    .status span {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.3em;
    }

    .categories {
      position: absolute;
      left: 0;
      right: 0;
      top: 46px;
      z-index: 10;
      height: 52px;
      overflow-x: auto;
      border-bottom: 1px solid var(--w006);
      background: rgba(10, 12, 16, 0.9);
      scrollbar-width: none;
    }

    .categories::-webkit-scrollbar {
      display: none;
    }

    .category-row {
      position: relative;
      min-width: 426px;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .category {
      position: relative;
      height: 52px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      background: transparent;
      color: var(--w025);
      font-size: 10px;
      letter-spacing: 0.1em;
      white-space: nowrap;
      transition: color 180ms ease;
    }

    .category + .category::before {
      content: "|";
      position: absolute;
      left: -2px;
      color: var(--w015);
    }

    .category.is-active {
      color: var(--w09);
    }

    .indicator {
      position: absolute;
      left: 16px;
      bottom: 0;
      width: 24px;
      height: 2px;
      background: var(--w09);
      transform: translateX(0);
      transition: transform 200ms var(--ease), width 200ms var(--ease);
    }

    .list {
      position: absolute;
      top: 98px;
      left: 0;
      right: 0;
      bottom: 68px;
      overflow-y: auto;
      padding: 10px 16px 18px;
      scrollbar-width: none;
    }

    .list::-webkit-scrollbar {
      display: none;
    }

    .lens-list {
      opacity: 1;
      transition: opacity 150ms ease;
    }

    .lens-list.is-fading {
      opacity: 0.3;
    }

    .lens-row {
      position: relative;
      width: 100%;
      min-height: 90px;
      display: grid;
      grid-template-columns: 68px 1fr 42px;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      background: transparent;
      text-align: left;
      transition: opacity 150ms ease, transform 150ms ease, background 100ms ease;
    }

    .lens-row.is-hidden {
      display: none;
    }

    .lens-row.is-armed {
      background: rgba(255, 255, 255, 0.025);
      transform: translateX(2px);
    }

    .orb {
      position: relative;
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border: 0.5px solid color-mix(in srgb, var(--lens-color), transparent 45%);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.018);
      box-shadow: 0 0 24px color-mix(in srgb, var(--lens-color), transparent 92%);
    }

    .orb svg {
      width: 24px;
      height: 24px;
      stroke: color-mix(in srgb, var(--lens-color), white 16%);
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .info {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .name {
      color: var(--w085);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .latin {
      color: var(--w03);
      font-size: 10px;
      letter-spacing: 0.12em;
    }

    .desc {
      overflow: hidden;
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 11px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .usage {
      display: grid;
      justify-items: end;
      gap: 11px;
      color: var(--w025);
      font-size: 10px;
      letter-spacing: 0.08em;
    }

    .chev {
      color: var(--w015);
      font-size: 18px;
      line-height: 1;
    }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      border-top: 1px solid var(--w006);
      background: var(--panel);
    }

    .tab {
      position: relative;
      height: 68px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      background: transparent;
      color: var(--w025);
      font-size: 9px;
      letter-spacing: 0.06em;
    }

    .tab.is-active {
      color: var(--w09);
    }

    .tab.is-active::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 18px;
      height: 2px;
      background: var(--w09);
      transform: translateX(-50%);
    }

    .tab-icon {
      width: 17px;
      height: 17px;
      display: grid;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 3px;
      font-size: 10px;
    }

    .capture-icon {
      width: 28px;
      height: 28px;
      border: 1px solid currentColor;
      border-radius: 4px;
      display: grid;
      place-items: center;
    }

    .capture-icon::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 1px solid currentColor;
      border-radius: 50%;
    }

    .detail {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: grid;
      grid-template-rows: 58px 238px 1fr 68px;
      background: var(--bg);
      transform: translateX(100%);
      transition: transform 250ms var(--ease);
      pointer-events: none;
    }

    .detail.is-open {
      transform: translateX(0);
      pointer-events: auto;
    }

    .detail-top {
      position: relative;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      align-items: end;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
    }

    .detail-back {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--w07);
      font-size: 22px;
    }

    .detail-title {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-align: center;
    }

    .hero {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 8px;
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--w006);
    }

    .hero .orb {
      width: 80px;
      height: 80px;
      margin-bottom: 4px;
      box-shadow: 0 0 36px color-mix(in srgb, var(--lens-color), transparent 90%);
    }

    .hero .orb svg {
      width: 34px;
      height: 34px;
    }

    .hero-name {
      color: var(--w09);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 16px;
    }

    .hero-latin {
      color: var(--w035);
      font-size: 11px;
      letter-spacing: 0.14em;
    }

    .hero-desc {
      max-width: 280px;
      margin: 3px 0 0;
      color: var(--w06);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .hero-stats {
      color: var(--w035);
      font-size: 9px;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .samples {
      overflow-y: auto;
      padding: 16px 16px 18px;
      scrollbar-width: none;
    }

    .samples::-webkit-scrollbar {
      display: none;
    }

    .sample-heading {
      margin: 0 0 10px;
      color: var(--w035);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
    }

    .sample-card {
      width: 100%;
      display: block;
      padding: 0;
      margin: 0 0 12px;
      background: transparent;
      text-align: left;
      transition: transform 100ms ease;
    }

    .sample-card:active,
    .sample-card.is-armed {
      transform: scale(1.015);
    }

    .sample-photo {
      position: relative;
      height: 140px;
      overflow: hidden;
      border: 1px solid var(--w006);
      border-radius: 4px;
      background: var(--sample-bg);
    }

    .sample-photo::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.14), transparent 24%),
        repeating-linear-gradient(90deg, transparent 0 23px, rgba(255, 255, 255, 0.025) 23px 24px),
        rgba(0, 0, 0, 0.16);
    }

    .mark {
      position: absolute;
      color: var(--w07);
      font-size: 10px;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
    }

    .mark::before {
      content: "";
      position: absolute;
      left: -34px;
      top: 7px;
      width: 28px;
      height: 1px;
      background: var(--w05);
      transform: rotate(-18deg);
      transform-origin: right center;
    }

    .mark.one { left: 148px; top: 34px; }
    .mark.two { left: 86px; top: 88px; }

    .sample-data {
      margin-top: 7px;
      color: var(--w035);
      font-size: 9px;
      letter-spacing: 0.08em;
    }

    .sample-summary {
      margin: 5px 0 0;
      overflow: hidden;
      color: var(--w06);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", sans-serif;
      font-size: 11px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      display: none;
      min-height: 236px;
      place-items: center;
      padding: 24px;
      border: 1px dashed var(--w015);
      border-radius: 4px;
      text-align: center;
    }

    .empty.is-visible {
      display: grid;
    }

    .empty-title {
      color: var(--w035);
      font-size: 11px;
      letter-spacing: 0.16em;
    }

    .empty-action,
    .use-action {
      height: 42px;
      padding: 0 16px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--w07);
      font-size: 10px;
      letter-spacing: 0.12em;
    }

    .detail-action {
      display: grid;
      place-items: center;
      border-top: 1px solid var(--w006);
      background: var(--panel);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 70;
      padding: 9px 12px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.76);
      color: var(--w07);
      font-size: 10px;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 430px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }

      .reset-demo {
        top: auto;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>

  <main class="phone" aria-label="世界观透镜镜片库页面">
    <header class="status">
      <span>LENS LIBRARY</span>
      <span>6 AVAILABLE</span>
    </header>

    <nav class="categories" aria-label="镜片分类">
      <div class="category-row">
        <button class="category is-active" type="button" data-category="ALL">ALL</button>
        <button class="category" type="button" data-category="NATURE">NATURE</button>
        <button class="category" type="button" data-category="CULTURE">CULTURE</button>
        <button class="category" type="button" data-category="URBAN">URBAN</button>
        <button class="category" type="button" data-category="TEMPORAL">TEMPORAL</button>
        <span class="indicator" aria-hidden="true"></span>
      </div>
    </nav>

    <section class="list" aria-label="镜片模块列表">
      <div class="lens-list"></div>
    </section>

    <nav class="tabbar" aria-label="底部导航">
      <button class="tab" type="button" data-tab="COLLECT"><span class="tab-icon">▱</span><span>COLLECT</span></button>
      <button class="tab is-active" type="button" data-tab="LENSES"><span class="tab-icon">◇</span><span>LENSES</span></button>
      <button class="tab" type="button" data-tab="CAPTURE"><span class="capture-icon"></span><span>CAPTURE</span></button>
      <button class="tab" type="button" data-tab="DISCOVER"><span class="tab-icon">⌖</span><span>DISCOVER</span></button>
      <button class="tab" type="button" data-tab="PROFILE"><span class="tab-icon">⌁</span><span>PROFILE</span></button>
    </nav>

    <section class="detail" aria-label="镜片详情">
      <header class="detail-top">
        <button class="detail-back" type="button" aria-label="返回">‹</button>
        <div class="detail-title"></div>
        <div aria-hidden="true"></div>
      </header>

      <section class="hero">
        <div class="orb detail-orb"></div>
        <div class="hero-name"></div>
        <div class="hero-latin"></div>
        <p class="hero-desc"></p>
        <div class="hero-stats"></div>
      </section>

      <section class="samples">
        <h2 class="sample-heading">SAMPLE READINGS</h2>
        <div class="sample-list"></div>
        <div class="empty">
          <div class="empty-title">NO READINGS YET</div>
          <button class="empty-action" type="button">CAPTURE WITH THIS LENS</button>
        </div>
      </section>

      <footer class="detail-action">
        <button class="use-action" type="button">USE THIS LENS</button>
      </footer>
    </section>

    <div class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const iconPaths = {
      leaf: '<path d="M5 19c8 0 13-6 14-14-8 1-14 6-14 14Z"/><path d="M5 19c4-5 8-8 14-14"/>',
      moon: '<path d="M18 15.5A7.5 7.5 0 0 1 8.5 6a8 8 0 1 0 9.5 9.5Z"/>',
      brush: '<path d="M17 3l4 4-10 10-4 1 1-4L17 3Z"/><path d="M4 21c2-3 4-3 7-3"/>',
      building: '<path d="M4 20h16"/><path d="M6 20V7l7-3 5 3v13"/><path d="M9 10h1M13 10h1M9 14h1M13 14h1"/>',
      chart: '<path d="M4 20V4"/><path d="M4 20h16"/><path d="M8 17v-5M12 17V8M16 17v-8"/>',
      eye: '<path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="2.5"/>'
    };

    const lenses = [
      {
        name: "博物学家",
        latin: "NATURALIST",
        color: "var(--green)",
        icon: "leaf",
        category: "NATURE",
        desc: "以生态学家的眼睛重新注视日常",
        usage: "×5",
        used: 5,
        stats: "USED 5 TIMES · FIRST USE 05.10 · LAST USE 05.16",
        samples: [
          ["05.16 | 31.2304N · 121.4737E", "街角的日常，也有被看见的价值。"],
          ["05.14 | 31.2192N · 121.4628E", "城市缝隙中的微型生态正在自我修复。"]
        ]
      },
      {
        name: "都市倦怠",
        latin: "URBAN FATIGUE",
        color: "var(--gray)",
        icon: "moon",
        category: "URBAN",
        desc: "疲惫但清醒的都市人视角",
        usage: "×3",
        used: 3,
        stats: "USED 3 TIMES · FIRST USE 05.11 · LAST USE 05.15",
        samples: [
          ["05.15 | 31.2248N · 121.4772E", "每一步都是为了走到能停下的地方。"],
          ["05.12 | 22.5431N · 114.0579E", "霓虹灯只对还没回家的人亮着。"]
        ]
      },
      {
        name: "宋代文人",
        latin: "SONG LITERATI",
        color: "var(--amber)",
        icon: "brush",
        category: "CULTURE",
        desc: "清供雅趣与山水闲情",
        usage: "×2",
        used: 2,
        stats: "USED 2 TIMES · FIRST USE 05.11 · LAST USE 05.14",
        samples: [
          ["05.14 | 30.2741N · 120.1551E", "庭前落叶三两片，恰是秋意最浓时。"],
          ["05.11 | 32.0603N · 118.7969E", "一盏茶的功夫，足以安顿半日浮躁。"]
        ]
      },
      {
        name: "废墟考古",
        latin: "RUIN ARCHAEOLOGY",
        color: "var(--coral)",
        icon: "building",
        category: "TEMPORAL",
        desc: "把当下看成未来的遗址",
        usage: "×2",
        used: 2,
        stats: "USED 2 TIMES · FIRST USE 05.10 · LAST USE 05.13",
        samples: [
          ["05.13 | 39.9042N · 116.4074E", "这面墙会比我们记得更多。"],
          ["05.10 | 31.8206N · 117.2272E", "停车场的裂缝里长出了第一棵树。"]
        ]
      },
      {
        name: "经济学家",
        latin: "ECONOMIST",
        color: "var(--blue)",
        icon: "chart",
        category: "URBAN",
        desc: "一切都是资源、成本与博弈",
        usage: "—",
        used: 0,
        stats: "USED 0 TIMES · FIRST USE --.-- · LAST USE --.--",
        samples: []
      },
      {
        name: "儿童视角",
        latin: "CHILD'S EYE",
        color: "var(--pink)",
        icon: "eye",
        category: "CULTURE",
        desc: "如果你只有五岁，这是什么",
        usage: "—",
        used: 0,
        stats: "USED 0 TIMES · FIRST USE --.-- · LAST USE --.--",
        samples: []
      }
    ];

    const lensList = document.querySelector(".lens-list");
    const categories = Array.from(document.querySelectorAll(".category"));
    const categoryRow = document.querySelector(".category-row");
    const indicator = document.querySelector(".indicator");
    const detail = document.querySelector(".detail");
    const detailBack = document.querySelector(".detail-back");
    const detailTitle = document.querySelector(".detail-title");
    const detailOrb = document.querySelector(".detail-orb");
    const heroName = document.querySelector(".hero-name");
    const heroLatin = document.querySelector(".hero-latin");
    const heroDesc = document.querySelector(".hero-desc");
    const heroStats = document.querySelector(".hero-stats");
    const sampleList = document.querySelector(".sample-list");
    const empty = document.querySelector(".empty");
    const useAction = document.querySelector(".use-action");
    const emptyAction = document.querySelector(".empty-action");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const resetButton = document.querySelector(".reset-demo");
    const toast = document.querySelector(".toast");

    let activeLens = lenses[0];
    let toastTimer = null;

    function iconSvg(name) {
      return `<svg viewBox="0 0 24 24" aria-hidden="true">${iconPaths[name]}</svg>`;
    }

    function renderList() {
      lensList.innerHTML = lenses.map((lens, index) => `
        <button class="lens-row" type="button" data-index="${index}" data-category="${lens.category}" style="--lens-color: ${lens.color};">
          <span class="orb">${iconSvg(lens.icon)}</span>
          <span class="info">
            <span class="name">${lens.name}</span>
            <span class="latin">${lens.latin}</span>
            <span class="desc">${lens.desc}</span>
          </span>
          <span class="usage"><span>${lens.usage}</span><span class="chev">›</span></span>
        </button>
      `).join("");

      document.querySelectorAll(".lens-row").forEach((row) => {
        row.addEventListener("click", () => {
          row.classList.add("is-armed");
          setTimeout(() => row.classList.remove("is-armed"), 140);
          openDetail(lenses[Number(row.dataset.index)]);
        });
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function moveIndicator(target) {
      const rowBox = categoryRow.getBoundingClientRect();
      const box = target.getBoundingClientRect();
      indicator.style.width = Math.max(18, box.width - 20) + "px";
      indicator.style.transform = `translateX(${box.left - rowBox.left + 10}px)`;
    }

    function applyCategory(value) {
      const target = categories.find((item) => item.dataset.category === value) || categories[0];
      categories.forEach((category) => category.classList.toggle("is-active", category === target));
      moveIndicator(target);
      lensList.classList.add("is-fading");

      setTimeout(() => {
        document.querySelectorAll(".lens-row").forEach((row) => {
          row.classList.toggle("is-hidden", value !== "ALL" && row.dataset.category !== value);
        });
        lensList.classList.remove("is-fading");
      }, 150);
    }

    function sampleBg(index) {
      return index % 2 === 0
        ? "linear-gradient(145deg, #314348, #1d282c 54%, #11171b)"
        : "linear-gradient(145deg, #4a4136, #2b2723 52%, #151515)";
    }

    function openDetail(lens) {
      activeLens = lens;
      detail.style.setProperty("--lens-color", lens.color);
      detailTitle.textContent = lens.latin;
      detailOrb.innerHTML = iconSvg(lens.icon);
      heroName.textContent = lens.name;
      heroLatin.textContent = lens.latin;
      heroDesc.textContent = lens.desc;
      heroStats.textContent = lens.stats;
      useAction.style.display = lens.used > 0 ? "inline-block" : "none";

      if (lens.used > 0) {
        empty.classList.remove("is-visible");
        sampleList.innerHTML = lens.samples.map((sample, index) => `
          <button class="sample-card" type="button">
            <span class="sample-photo" style="--sample-bg: ${sampleBg(index)};">
              <span class="mark one">TRACE ${index + 1}</span>
              <span class="mark two">READING</span>
            </span>
            <span class="sample-data">${sample[0]}</span>
            <span class="sample-summary">${sample[1]}</span>
          </button>
        `).join("");
        document.querySelectorAll(".sample-card").forEach((card) => {
          card.addEventListener("click", () => {
            card.classList.add("is-armed");
            setTimeout(() => card.classList.remove("is-armed"), 160);
            showToast("查看完整切片");
          });
        });
      } else {
        sampleList.innerHTML = "";
        empty.classList.add("is-visible");
      }

      detail.classList.add("is-open");
    }

    function closeDetail() {
      detail.classList.remove("is-open");
    }

    function resetPage() {
      applyCategory("ALL");
      closeDetail();
      tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.tab === "LENSES"));
      showToast("RESET COMPLETE");
    }

    categories.forEach((category) => {
      category.addEventListener("click", () => applyCategory(category.dataset.category));
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("is-active"));
        tab.classList.add("is-active");
        const name = tab.dataset.tab;
        showToast(name === "CAPTURE" ? "打开取景页" : `跳转到 ${name}`);
      });
    });

    detailBack.addEventListener("click", closeDetail);
    useAction.addEventListener("click", () => showToast("打开取景页"));
    emptyAction.addEventListener("click", () => showToast("打开取景页"));
    resetButton.addEventListener("click", resetPage);

    renderList();
    window.addEventListener("load", () => moveIndicator(categories[0]));
  </script>
</body>
</html>
