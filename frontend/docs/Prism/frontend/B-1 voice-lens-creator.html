<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - AI 语聊创建镜片</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --coral: #F0997B;
      --coral-50: rgba(240,153,123,0.5);
      --coral-30: rgba(240,153,123,0.3);
      --coral-06: rgba(240,153,123,0.06);
      --coral-03: rgba(240,153,123,0.03);
      --w006: rgba(255,255,255,0.06);
      --w01: rgba(255,255,255,0.1);
      --w012: rgba(255,255,255,0.12);
      --w02: rgba(255,255,255,0.2);
      --w025: rgba(255,255,255,0.25);
      --w03: rgba(255,255,255,0.3);
      --w035: rgba(255,255,255,0.35);
      --w04: rgba(255,255,255,0.4);
      --w05: rgba(255,255,255,0.5);
      --w055: rgba(255,255,255,0.55);
      --w06: rgba(255,255,255,0.6);
      --w07: rgba(255,255,255,0.7);
      --w085: rgba(255,255,255,0.85);
      --mono: "SF Mono", Menlo, "Courier New", monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --ease: cubic-bezier(0.2, 0.86, 0.26, 1);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w085);
      font-family: var(--mono);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 90;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background:
        radial-gradient(circle at 50% 18%, rgba(240,153,123,0.06), transparent 28%),
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 24px 24px, 24px 24px, auto;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
      isolation: isolate;
    }

    .top {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 20;
      height: 58px;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      align-items: end;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.94);
    }

    .back {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 22px;
      line-height: 1;
    }

    .title {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-align: center;
    }

    .content {
      position: absolute;
      inset: 58px 0 76px;
      overflow-y: auto;
      padding: 0 16px 22px;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }

    .content::-webkit-scrollbar { display: none; }

    .guide {
      min-height: 188px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 10px;
      text-align: center;
      transition: transform 300ms var(--ease), min-height 300ms var(--ease), opacity 300ms ease;
    }

    .guide-title {
      margin: 0;
      color: var(--w055);
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      transition: font-size 300ms var(--ease), opacity 300ms ease;
    }

    .guide-copy {
      margin: 0;
      color: var(--w02);
      font-size: 10px;
      letter-spacing: 0.02em;
      line-height: 1.5;
      transition: opacity 300ms ease;
    }

    .phone.is-engaged .guide {
      min-height: 126px;
      transform: translateY(-20px);
      opacity: 0.74;
    }

    .phone.is-engaged .guide-title {
      font-size: 12px;
      opacity: 0.45;
    }

    .phone.is-engaged .guide-copy {
      opacity: 0.62;
    }

    .dialog {
      display: grid;
      gap: 10px;
      min-height: 240px;
      padding-bottom: 22px;
    }

    .bubble {
      max-width: 86%;
      padding: 10px 11px;
      border: 1px solid var(--w006);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-family: var(--sans);
      font-size: 12px;
      line-height: 1.55;
      opacity: 0;
      transform: translateY(10px);
      animation: bubbleIn 260ms var(--ease) forwards;
    }

    .bubble.user {
      justify-self: end;
      border-color: var(--w012);
      color: var(--w085);
      background: rgba(255,255,255,0.032);
    }

    .bubble.ai {
      justify-self: start;
    }

    @keyframes bubbleIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .generating {
      justify-self: start;
      width: 180px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 1px solid var(--w006);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(10px);
      animation: bubbleIn 260ms var(--ease) forwards;
    }

    .lens-spinner {
      position: relative;
      width: 18px;
      height: 18px;
      border: 1px solid rgba(240,153,123,0.42);
      border-radius: 50%;
      animation: rotateLens 3s linear infinite;
    }

    .lens-spinner::before,
    .lens-spinner::after {
      content: "";
      position: absolute;
      background: rgba(240,153,123,0.32);
    }

    .lens-spinner::before {
      left: 50%;
      top: 3px;
      bottom: 3px;
      width: 1px;
      transform: translateX(-50%);
    }

    .lens-spinner::after {
      left: 3px;
      right: 3px;
      top: 50%;
      height: 1px;
      transform: translateY(-50%);
    }

    @keyframes rotateLens {
      to { transform: rotate(360deg); }
    }

    .draft {
      display: grid;
      gap: 12px;
      margin-top: 2px;
      padding: 14px;
      border: 1px dashed var(--coral-30);
      border-radius: 6px;
      background: var(--coral-03);
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    .draft.is-visible {
      pointer-events: auto;
      animation: draftIn 400ms ease-out forwards;
    }

    .draft.is-leaving {
      animation: draftOut 200ms ease forwards;
    }

    .draft.is-created {
      border-style: solid;
      animation: createdPop 520ms var(--ease) forwards;
    }

    @keyframes draftIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes draftOut {
      to { opacity: 0; transform: translateY(10px); }
    }

    @keyframes createdPop {
      0% { transform: scale(1); }
      45% { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }

    .draft-label {
      color: var(--w025);
      font-size: 9px;
      letter-spacing: 0.18em;
      transition: color 300ms ease;
    }

    .draft.is-created .draft-label {
      color: var(--w06);
    }

    .draft-main {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .lens-orb {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 1px solid var(--coral);
      border-radius: 50%;
      background: rgba(240,153,123,0.04);
      box-shadow: 0 0 24px rgba(240,153,123,0.14);
      color: rgba(240,153,123,0.72);
      font-size: 22px;
      line-height: 1;
    }

    .draft-text {
      min-width: 0;
    }

    .draft-name {
      color: var(--w085);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
    }

    .draft-english {
      margin-top: 3px;
      color: var(--w025);
      font-size: 9px;
      letter-spacing: 0.08em;
      line-height: 1.4;
    }

    .draft-desc {
      margin: 7px 0 0;
      color: var(--w05);
      font-family: var(--sans);
      font-size: 12px;
      line-height: 1.5;
    }

    .draft-tip {
      margin: 1px 0 0;
      color: var(--w02);
      font-size: 9px;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .voice-zone {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 102px;
      z-index: 18;
      display: grid;
      justify-items: center;
      gap: 10px;
      transition: opacity 300ms ease, transform 300ms var(--ease);
    }

    .voice-zone.is-hidden {
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }

    .mic {
      position: relative;
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w01);
      border-radius: 50%;
      background: transparent;
      transition: border-color 220ms ease;
    }

    .mic-inner {
      position: relative;
      width: 60px;
      height: 60px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.025);
      transition: background 220ms ease;
    }

    .mic-symbol {
      position: relative;
      width: 24px;
      height: 32px;
      color: var(--w04);
      transition: color 220ms ease;
    }

    .mic-symbol::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 1px;
      width: 10px;
      height: 18px;
      border-radius: 7px;
      border: 2px solid currentColor;
      background: transparent;
    }

    .mic-symbol::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 13px;
      width: 16px;
      height: 13px;
      border: 2px solid currentColor;
      border-top: 0;
      border-radius: 0 0 12px 12px;
    }

    .mic-stand {
      position: absolute;
      left: 11px;
      bottom: 0;
      width: 2px;
      height: 8px;
      background: currentColor;
    }

    .mic-stand::after {
      content: "";
      position: absolute;
      left: -5px;
      bottom: 0;
      width: 12px;
      height: 2px;
      background: currentColor;
    }

    .pulse {
      position: absolute;
      inset: 0;
      border: 1px solid var(--coral-50);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }

    .phone.is-recording .mic {
      border-color: var(--coral-50);
    }

    .phone.is-recording .mic-inner {
      background: var(--coral-06);
    }

    .phone.is-recording .mic-symbol {
      color: var(--coral);
    }

    .phone.is-recording .pulse {
      animation: pulseRing 1.8s ease-out infinite;
    }

    .phone.is-recording .pulse:nth-child(1) { animation-delay: 0s; }
    .phone.is-recording .pulse:nth-child(2) { animation-delay: 0.6s; }
    .phone.is-recording .pulse:nth-child(3) { animation-delay: 1.2s; }

    @keyframes pulseRing {
      0% { opacity: 0.3; transform: scale(1); }
      100% { opacity: 0; transform: scale(2.2); }
    }

    .loading-dots {
      display: none;
      align-items: center;
      gap: 6px;
    }

    .loading-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.2;
      animation: dotBlink 960ms ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 160ms; }
    .loading-dots span:nth-child(3) { animation-delay: 320ms; }

    @keyframes dotBlink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.7; }
    }

    .phone.is-processing .mic-symbol {
      display: none;
    }

    .phone.is-processing .loading-dots {
      display: flex;
    }

    .mic-state {
      color: var(--w03);
      font-size: 10px;
      letter-spacing: 0.14em;
      transition: color 180ms ease;
    }

    .phone.is-recording .mic-state {
      color: rgba(240,153,123,0.7);
    }

    .actions {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      height: 76px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid var(--w006);
      background: var(--panel);
    }

    .actions.is-single {
      grid-template-columns: 1fr;
      padding-left: 88px;
      padding-right: 88px;
    }

    .actions button {
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.12em;
      transition: opacity 180ms ease, color 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .actions .create,
    .actions .back-picker {
      color: var(--w05);
      border-color: rgba(255,255,255,0.22);
    }

    .actions .back-picker {
      display: none;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 88px;
      z-index: 60;
      padding: 9px 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 430px) {
      body { place-items: start center; padding-top: 10px; }
      .reset-demo { top: auto; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>

  <main class="phone" aria-label="AI 语聊创建自定义镜片">
    <header class="top">
      <button class="back" type="button" aria-label="返回">‹</button>
      <div class="title">CREATE LENS</div>
      <div></div>
    </header>

    <section class="content">
      <section class="guide" aria-label="创建引导">
        <h1 class="guide-title">说出你想要的观察视角</h1>
        <p class="guide-copy">AI 会为你生成一枚独特的镜片</p>
      </section>

      <section class="dialog" aria-live="polite"></section>
    </section>

    <section class="voice-zone" aria-label="语音输入">
      <button class="mic" type="button" aria-label="点击说话">
        <span class="pulse"></span>
        <span class="pulse"></span>
        <span class="pulse"></span>
        <span class="mic-inner">
          <span class="mic-symbol"><span class="mic-stand"></span></span>
          <span class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></span>
        </span>
      </button>
      <div class="mic-state">TAP TO SPEAK</div>
    </section>

    <footer class="actions is-single">
      <button class="cancel" type="button">CANCEL</button>
      <button class="regenerate" type="button">REGENERATE</button>
      <button class="create" type="button">CREATE</button>
      <button class="back-picker" type="button">BACK TO LENS PICKER</button>
    </footer>

    <div class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const phone = document.querySelector(".phone");
    const content = document.querySelector(".content");
    const dialog = document.querySelector(".dialog");
    const voiceZone = document.querySelector(".voice-zone");
    const mic = document.querySelector(".mic");
    const micState = document.querySelector(".mic-state");
    const actions = document.querySelector(".actions");
    const cancelButton = document.querySelector(".cancel");
    const regenerateButton = document.querySelector(".regenerate");
    const createButton = document.querySelector(".create");
    const backPickerButton = document.querySelector(".back-picker");
    const backButton = document.querySelector(".back");
    const resetButton = document.querySelector(".reset-demo");
    const toast = document.querySelector(".toast");

    const rounds = [
      {
        user: "我想用考古学家的视角看城市里被时间遗忘的东西",
        ai: "这是为你生成的镜片——它会让你注意到那些正在被遗忘的城市表面。",
        name: "废弃招牌收藏家",
        english: "ABANDONED SIGN COLLECTOR",
        desc: "每一块褪色的招牌都是一个消失的故事的封面。"
      },
      {
        user: "换一个吧，我想更关注那些老旧的手写招牌",
        ai: "这一次，镜片会把城市当作一份仍在褪色的手写档案。",
        name: "手写招牌考古学家",
        english: "HANDWRITTEN SIGN ARCHAEOLOGIST",
        desc: "每一笔歪扭的字迹都是一个时代的笔迹鉴定样本。"
      }
    ];

    let roundIndex = 0;
    let isBusy = false;
    let toastTimer = null;
    let typingTimer = null;
    let timers = [];

    function wait(ms, fn) {
      const timer = setTimeout(fn, ms);
      timers.push(timer);
      return timer;
    }

    function clearTimers() {
      timers.forEach((timer) => clearTimeout(timer));
      timers = [];
      if (typingTimer) {
        clearInterval(typingTimer);
        typingTimer = null;
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function scrollLatest() {
      const latest = dialog.lastElementChild;
      if (latest) latest.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function addBubble(type, text = "") {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${type}`;
      bubble.textContent = text;
      dialog.appendChild(bubble);
      wait(40, scrollLatest);
      return bubble;
    }

    function addGenerating() {
      const card = document.createElement("div");
      card.className = "generating";
      card.innerHTML = '<span class="lens-spinner"></span><span>GENERATING LENS...</span>';
      dialog.appendChild(card);
      wait(40, scrollLatest);
      return card;
    }

    function typeText(node, text, done) {
      let index = 0;
      node.textContent = "";
      typingTimer = setInterval(() => {
        node.textContent += text[index] || "";
        index += 1;
        scrollLatest();
        if (index >= text.length) {
          clearInterval(typingTimer);
          typingTimer = null;
          done && done();
        }
      }, 40);
    }

    function addDraft(data) {
      const draft = document.createElement("section");
      draft.className = "draft";
      draft.innerHTML = `
        <div class="draft-label">LENS GENERATED</div>
        <div class="draft-main">
          <div class="lens-orb">⌂</div>
          <div class="draft-text">
            <div class="draft-name">${data.name}</div>
            <div class="draft-english">${data.english}</div>
            <p class="draft-desc">${data.desc}</p>
          </div>
        </div>
        <p class="draft-tip">不满意？再说一次，重新生成</p>
      `;
      dialog.appendChild(draft);
      requestAnimationFrame(() => draft.classList.add("is-visible"));
      wait(80, scrollLatest);
      return draft;
    }

    function setIdleLabel(text = "TAP TO SPEAK") {
      micState.textContent = text;
      phone.classList.remove("is-recording", "is-processing");
    }

    function showVoice(text = "TAP TO SPEAK") {
      setIdleLabel(text);
      voiceZone.classList.remove("is-hidden");
    }

    function hideVoice() {
      voiceZone.classList.add("is-hidden");
    }

    function setInitialActions() {
      actions.className = "actions is-single";
      cancelButton.style.display = "block";
      regenerateButton.style.display = "none";
      createButton.style.display = "none";
      backPickerButton.style.display = "none";
      cancelButton.textContent = "CANCEL";
    }

    function setDraftActions() {
      actions.className = "actions";
      cancelButton.style.display = "none";
      regenerateButton.style.display = "block";
      createButton.style.display = "block";
      backPickerButton.style.display = "none";
      createButton.textContent = "CREATE";
    }

    function setCreatedActions() {
      actions.className = "actions is-single";
      cancelButton.style.display = "none";
      regenerateButton.style.display = "none";
      createButton.style.display = "none";
      backPickerButton.style.display = "block";
    }

    function beginRecording() {
      if (isBusy || voiceZone.classList.contains("is-hidden")) return;
      isBusy = true;
      phone.classList.add("is-engaged", "is-recording");
      phone.classList.remove("is-processing");
      micState.textContent = "LISTENING...";

      wait(2000, () => {
        phone.classList.remove("is-recording");
        phone.classList.add("is-processing");
        micState.textContent = "PROCESSING...";
      });

      wait(2800, () => {
        const data = rounds[Math.min(roundIndex, rounds.length - 1)];
        addBubble("user", data.user);
        hideVoice();
        phone.classList.remove("is-processing");
        const generating = addGenerating();

        wait(2000, () => {
          generating.remove();
          const aiBubble = addBubble("ai");
          typeText(aiBubble, data.ai, () => {
            wait(300, () => {
              addDraft(data);
              setDraftActions();
              isBusy = false;
            });
          });
        });
      });
    }

    function regenerate() {
      if (isBusy) return;
      const draft = dialog.querySelector(".draft:last-child");
      if (draft) {
        draft.classList.add("is-leaving");
        wait(210, () => draft.remove());
      }
      roundIndex = Math.min(roundIndex + 1, rounds.length - 1);
      setInitialActions();
      showVoice("TAP TO SPEAK AGAIN");
    }

    function createLens() {
      if (isBusy) return;
      const draft = dialog.querySelector(".draft:last-child");
      if (!draft) {
        showToast("请先生成镜片");
        return;
      }
      isBusy = true;
      createButton.textContent = "CREATING...";
      wait(600, () => {
        draft.classList.add("is-created");
        const label = draft.querySelector(".draft-label");
        label.textContent = "LENS CREATED ✓";
        showToast("镜片已创建");
        setCreatedActions();
        isBusy = false;
      });
    }

    function resetState() {
      clearTimers();
      isBusy = false;
      roundIndex = 0;
      dialog.innerHTML = "";
      phone.classList.remove("is-engaged", "is-recording", "is-processing");
      showVoice("TAP TO SPEAK");
      setInitialActions();
    }

    mic.addEventListener("click", beginRecording);
    regenerateButton.addEventListener("click", regenerate);
    createButton.addEventListener("click", createLens);
    cancelButton.addEventListener("click", () => showToast("返回镜片选择"));
    backButton.addEventListener("click", () => showToast("返回镜片选择"));
    backPickerButton.addEventListener("click", () => showToast("返回镜片选择"));
    resetButton.addEventListener("click", () => {
      resetState();
      showToast("RESET COMPLETE");
    });

    resetState();
  </script>
</body>
</html>
