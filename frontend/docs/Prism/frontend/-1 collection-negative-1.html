<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - 我的切片</title>
  <style>
    :root {
      --page-bg: #0f1119;
      --phone-bg: #11141d;
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.5);
      --line: rgba(255, 255, 255, 0.13);
      --glass: rgba(14, 17, 24, 0.68);
      --green: #78a978;
      --gray: #8d929b;
      --amber: #c79a4d;
      --coral: #d9796b;
      --ease: cubic-bezier(0.18, 0.9, 0.24, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--page-bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 50;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 34px;
      background: var(--phone-bg);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.46);
      isolation: isolate;
    }

    .topbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 10;
      height: 74px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 18px 16px;
      background: linear-gradient(180deg, rgba(17, 20, 29, 0.98), rgba(17, 20, 29, 0));
    }

    .title {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .filters {
      position: absolute;
      left: 0;
      right: 0;
      top: 74px;
      z-index: 10;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 18px 14px;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter {
      flex: 0 0 auto;
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: transparent;
      color: rgba(255, 255, 255, 0.52);
      font-size: 12px;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .filter.is-active {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.92);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dot);
    }

    .content {
      position: absolute;
      left: 0;
      right: 0;
      top: 120px;
      bottom: 86px;
      overflow-y: auto;
      padding: 0 14px 22px;
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar {
      display: none;
    }

    .grid {
      column-count: 2;
      column-gap: 10px;
      opacity: 1;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .grid.is-fading {
      opacity: 0;
      transform: translateY(5px);
    }

    .slice-card {
      position: relative;
      display: inline-block;
      width: 100%;
      height: var(--h);
      margin: 0 0 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: var(--bg);
      text-align: left;
      break-inside: avoid;
      transform-origin: center;
      transition: transform 120ms ease, opacity 180ms ease;
    }

    .slice-card.is-hidden {
      display: none;
    }

    .slice-card.is-pressed {
      transform: scale(1.02);
    }

    .slice-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.2), transparent 24%),
        radial-gradient(circle at 72% 58%, rgba(0, 0, 0, 0.18), transparent 24%),
        repeating-linear-gradient(90deg, transparent 0 17px, rgba(255, 255, 255, 0.025) 17px 18px);
      opacity: 0.72;
    }

    .date {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.68);
      font-size: 10px;
      letter-spacing: 0.06em;
    }

    .info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      min-height: 40%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
      padding: 42px 10px 10px;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.72));
    }

    .lens-tag {
      align-self: flex-start;
      height: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--lens-color), transparent 68%);
      color: rgba(255, 255, 255, 0.88);
      font-size: 11px;
      white-space: nowrap;
    }

    .summary {
      margin: 0;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.72);
    }

    .tabbar {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 12;
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      padding: 8px 6px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 20px;
      background: rgba(10, 12, 18, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .tab {
      height: 52px;
      display: grid;
      place-items: center;
      gap: 3px;
      background: transparent;
      color: rgba(255, 255, 255, 0.42);
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .tab-icon {
      font-size: 18px;
      line-height: 1;
    }

    .tab.is-active {
      color: rgba(255, 255, 255, 0.96);
    }

    .tab.shoot {
      transform: translateY(-4px);
    }

    .shutter-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      font-size: 17px;
    }

    .detail {
      position: absolute;
      inset: 0;
      z-index: 30;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .detail.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-photo {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: var(--detail-bg);
      transform: translate3d(var(--start-x), var(--start-y), 0) scale(var(--start-scale-x), var(--start-scale-y));
      transform-origin: top left;
      transition: transform 300ms var(--ease), border-radius 300ms var(--ease);
    }

    .detail.is-open .detail-photo {
      border-radius: 0;
      transform: translate3d(0, 0, 0) scale(1, 1);
    }

    .detail-photo::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 24% 20%, rgba(255, 255, 255, 0.2), transparent 20%),
        repeating-linear-gradient(90deg, transparent 0 28px, rgba(255, 255, 255, 0.025) 28px 29px),
        rgba(0, 0, 0, 0.13);
    }

    .detail-back {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 34;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      background: rgba(10, 12, 18, 0.48);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: 26px;
      opacity: 0;
      transition: opacity 160ms ease 160ms;
    }

    .detail.is-open .detail-back,
    .detail.is-open .detail-notes,
    .detail.is-open .detail-meta {
      opacity: 1;
    }

    .detail-notes {
      position: absolute;
      inset: 0;
      z-index: 33;
      opacity: 0;
      transition: opacity 180ms ease 160ms;
    }

    .detail-note {
      position: absolute;
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      line-height: 1.35;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.8);
    }

    .detail-note::before {
      content: "";
      position: absolute;
      left: -38px;
      top: 9px;
      width: 32px;
      height: 1px;
      background: rgba(255, 255, 255, 0.72);
      transform: rotate(-22deg);
      transform-origin: right center;
    }

    .detail-note.one { left: 176px; top: 150px; width: 130px; }
    .detail-note.two { left: 86px; top: 330px; width: 140px; }
    .detail-note.three { left: 196px; top: 486px; width: 120px; }

    .detail-meta {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 20px;
      z-index: 34;
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      background: rgba(7, 9, 13, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      opacity: 0;
      transition: opacity 180ms ease 160ms;
    }

    .detail-summary {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      line-height: 1.5;
    }

    .detail-date {
      color: rgba(255, 255, 255, 0.52);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .sheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 42;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      background: rgba(12, 14, 20, 0.74);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      transform: translateY(116%);
      transition: opacity 220ms ease, transform 220ms var(--ease);
      pointer-events: none;
    }

    .sheet.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .sheet button {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.065);
      color: rgba(255, 255, 255, 0.86);
      text-align: center;
      font-size: 14px;
    }

    .sheet button + button {
      margin-top: 8px;
    }

    .sheet .danger {
      color: rgba(255, 174, 168, 0.95);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 94px;
      z-index: 60;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
      opacity: 0;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 430px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }

      .reset-demo {
        top: auto;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">重置</button>

  <main class="phone" aria-label="世界观透镜收藏页原型">
    <header class="topbar">
      <div class="title">我的切片</div>
      <div class="count">12 枚</div>
    </header>

    <nav class="filters" aria-label="镜片筛选">
      <button class="filter is-active" type="button" data-filter="全部">全部</button>
      <button class="filter" type="button" data-filter="博物学家"><span class="dot" style="--dot: var(--green);"></span>博物学家</button>
      <button class="filter" type="button" data-filter="都市倦怠"><span class="dot" style="--dot: var(--gray);"></span>都市倦怠</button>
      <button class="filter" type="button" data-filter="宋代文人"><span class="dot" style="--dot: var(--amber);"></span>宋代文人</button>
      <button class="filter" type="button" data-filter="废墟考古"><span class="dot" style="--dot: var(--coral);"></span>废墟考古</button>
    </nav>

    <section class="content" aria-label="认知切片列表">
      <div class="grid">
        <button class="slice-card" type="button" data-lens="博物学家" data-date="05.16" data-summary="街角的日常，也有被看见的价值。" data-coord="31.2304°N, 121.4737°E" style="--h: 240px; --lens-color: var(--green); --bg: linear-gradient(160deg, #355f63, #223c3b 46%, #182323);">
          <span class="date">05.16</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--green);"></span>博物学家</span><span class="summary">街角的日常，也有被看见的价值。</span></span>
        </button>

        <button class="slice-card" type="button" data-lens="都市倦怠" data-date="05.15" data-summary="每一步都是为了走到能停下的地方。" data-coord="31.2248°N, 121.4772°E" style="--h: 190px; --lens-color: var(--gray); --bg: linear-gradient(155deg, #554c66, #33313d 52%, #1d2028);">
          <span class="date">05.15</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--gray);"></span>都市倦怠</span><span class="summary">每一步都是为了走到能停下的地方。</span></span>
        </button>

        <button class="slice-card" type="button" data-lens="宋代文人" data-date="05.13" data-summary="庭前落叶三两片，恰是秋意最浓时。" data-coord="30.2741°N, 120.1551°E" style="--h: 220px; --lens-color: var(--amber); --bg: linear-gradient(150deg, #9a7a3d, #5b4427 50%, #27221b);">
          <span class="date">05.13</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--amber);"></span>宋代文人</span><span class="summary">庭前落叶三两片，恰是秋意最浓时。</span></span>
        </button>

        <button class="slice-card" type="button" data-lens="博物学家" data-date="05.12" data-summary="城市缝隙中的微型生态正在自我修复。" data-coord="31.2192°N, 121.4628°E" style="--h: 260px; --lens-color: var(--green); --bg: linear-gradient(160deg, #607378, #394a4d 48%, #1a2421);">
          <span class="date">05.12</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--green);"></span>博物学家</span><span class="summary">城市缝隙中的微型生态正在自我修复。</span></span>
        </button>

        <button class="slice-card" type="button" data-lens="废墟考古" data-date="05.10" data-summary="这面墙会比我们记得更多。" data-coord="39.9042°N, 116.4074°E" style="--h: 200px; --lens-color: var(--coral); --bg: linear-gradient(145deg, #743d3d, #47262a 50%, #211b20);">
          <span class="date">05.10</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--coral);"></span>废墟考古</span><span class="summary">这面墙会比我们记得更多。</span></span>
        </button>

        <button class="slice-card" type="button" data-lens="都市倦怠" data-date="05.08" data-summary="霓虹灯只对还没回家的人亮着。" data-coord="22.5431°N, 114.0579°E" style="--h: 180px; --lens-color: var(--gray); --bg: linear-gradient(145deg, #243d66, #19273f 54%, #111827);">
          <span class="date">05.08</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--gray);"></span>都市倦怠</span><span class="summary">霓虹灯只对还没回家的人亮着。</span></span>
        </button>

        <button class="slice-card" type="button" data-lens="宋代文人" data-date="05.07" data-summary="一盏茶的功夫，足以安顿半日浮躁。" data-coord="32.0603°N, 118.7969°E" style="--h: 230px; --lens-color: var(--amber); --bg: linear-gradient(150deg, #80613d, #4e3825 48%, #241d18);">
          <span class="date">05.07</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--amber);"></span>宋代文人</span><span class="summary">一盏茶的功夫，足以安顿半日浮躁。</span></span>
        </button>

        <button class="slice-card" type="button" data-lens="废墟考古" data-date="05.04" data-summary="停车场的裂缝里长出了第一棵树。" data-coord="31.8206°N, 117.2272°E" style="--h: 210px; --lens-color: var(--coral); --bg: linear-gradient(155deg, #56685b, #38443c 52%, #20241f);">
          <span class="date">05.04</span>
          <span class="info"><span class="lens-tag"><span class="dot" style="--dot: var(--coral);"></span>废墟考古</span><span class="summary">停车场的裂缝里长出了第一棵树。</span></span>
        </button>
      </div>
    </section>

    <nav class="tabbar" aria-label="底部导航">
      <button class="tab is-active" type="button" data-tab="收藏"><span class="tab-icon">▰</span><span>收藏</span></button>
      <button class="tab" type="button" data-tab="镜片库"><span class="tab-icon">◌</span><span>镜片库</span></button>
      <button class="tab shoot" type="button" data-tab="拍摄"><span class="shutter-btn">◎</span><span>拍摄</span></button>
      <button class="tab" type="button" data-tab="发现"><span class="tab-icon">⌖</span><span>发现</span></button>
      <button class="tab" type="button" data-tab="我的"><span class="tab-icon">♙</span><span>我的</span></button>
    </nav>

    <section class="detail" aria-label="切片详情">
      <div class="detail-photo"></div>
      <button class="detail-back" type="button" aria-label="返回切片列表">‹</button>
      <div class="detail-notes" aria-hidden="true">
        <div class="detail-note one">被镜片重新命名的现场</div>
        <div class="detail-note two">照片中的时间痕迹</div>
        <div class="detail-note three">可收藏的认知切面</div>
      </div>
      <div class="detail-meta">
        <p class="detail-summary"></p>
        <div class="detail-date"></div>
      </div>
    </section>

    <section class="sheet" aria-label="切片操作菜单">
      <button type="button" data-action="换镜片重看">换镜片重看</button>
      <button type="button" data-action="分享切片">分享切片</button>
      <button class="danger" type="button" data-action="删除">删除</button>
    </section>

    <div class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const phone = document.querySelector(".phone");
    const filters = Array.from(document.querySelectorAll(".filter"));
    const grid = document.querySelector(".grid");
    const cards = Array.from(document.querySelectorAll(".slice-card"));
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const toast = document.querySelector(".toast");
    const sheet = document.querySelector(".sheet");
    const resetButton = document.querySelector(".reset-demo");
    const detail = document.querySelector(".detail");
    const detailPhoto = document.querySelector(".detail-photo");
    const detailBack = document.querySelector(".detail-back");
    const detailSummary = document.querySelector(".detail-summary");
    const detailDate = document.querySelector(".detail-date");

    let activeFilter = "全部";
    let toastTimer = null;
    let longPressTimer = null;
    let longPressFired = false;
    let activeCard = null;
    let detailRect = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1500);
    }

    function applyFilter(value) {
      activeFilter = value;
      filters.forEach((filter) => {
        filter.classList.toggle("is-active", filter.dataset.filter === value);
      });

      grid.classList.add("is-fading");
      setTimeout(() => {
        cards.forEach((card) => {
          const visible = value === "全部" || card.dataset.lens === value;
          card.classList.toggle("is-hidden", !visible);
        });
        grid.classList.remove("is-fading");
      }, 170);
    }

    function openDetail(card) {
      if (longPressFired) return;
      activeCard = card;
      card.classList.add("is-pressed");

      setTimeout(() => {
        card.classList.remove("is-pressed");
        const phoneBox = phone.getBoundingClientRect();
        const cardBox = card.getBoundingClientRect();
        detailRect = {
          x: cardBox.left - phoneBox.left,
          y: cardBox.top - phoneBox.top,
          width: cardBox.width,
          height: cardBox.height
        };

        detail.style.setProperty("--start-x", detailRect.x + "px");
        detail.style.setProperty("--start-y", detailRect.y + "px");
        detail.style.setProperty("--start-scale-x", detailRect.width / 375);
        detail.style.setProperty("--start-scale-y", detailRect.height / 812);
        detail.style.setProperty("--detail-bg", card.style.getPropertyValue("--bg"));
        detailSummary.textContent = card.dataset.summary;
        detailDate.textContent = `${card.dataset.date} · ${card.dataset.lens} · ${card.dataset.coord}`;
        detail.offsetWidth;
        detail.classList.add("is-open");
      }, 100);
    }

    function closeDetail() {
      detail.classList.remove("is-open");
    }

    function startLongPress(card) {
      longPressFired = false;
      clearTimeout(longPressTimer);
      longPressTimer = setTimeout(() => {
        longPressFired = true;
        activeCard = card;
        sheet.classList.add("is-open");
      }, 500);
    }

    function cancelLongPress() {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }

    function resetPage() {
      applyFilter("全部");
      tabs.forEach((tab) => tab.classList.toggle("is-active", tab.dataset.tab === "收藏"));
      sheet.classList.remove("is-open");
      closeDetail();
      showToast("已重置");
    }

    filters.forEach((filter) => {
      filter.addEventListener("click", () => applyFilter(filter.dataset.filter));
    });

    cards.forEach((card) => {
      card.addEventListener("click", () => openDetail(card));
      card.addEventListener("pointerdown", () => startLongPress(card));
      card.addEventListener("pointerup", cancelLongPress);
      card.addEventListener("pointerleave", cancelLongPress);
      card.addEventListener("pointercancel", cancelLongPress);
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("is-active"));
        tab.classList.add("is-active");
        const name = tab.dataset.tab;
        showToast(name === "拍摄" ? "打开取景页" : `跳转到 ${name} 页`);
      });
    });

    sheet.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      sheet.classList.remove("is-open");
      showToast(button.dataset.action);
    });

    detailBack.addEventListener("click", closeDetail);
    resetButton.addEventListener("click", resetPage);
  </script>
</body>
</html>
