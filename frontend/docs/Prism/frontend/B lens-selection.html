<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - 镜片选择页</title>
  <style>
    :root {
      --page-bg: #0f1119;
      --phone-bg: #11141d;
      --panel: rgba(255, 255, 255, 0.045);
      --panel-strong: rgba(255, 255, 255, 0.075);
      --line: rgba(255, 255, 255, 0.13);
      --line-bright: rgba(255, 255, 255, 0.56);
      --text: rgba(255, 255, 255, 0.9);
      --muted: rgba(255, 255, 255, 0.48);
      --faint: rgba(255, 255, 255, 0.28);
      --ease: cubic-bezier(0.2, 0.86, 0.26, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--page-bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 30;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 34px;
      background: var(--phone-bg);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.46);
      isolation: isolate;
    }

    .nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 12;
      height: 66px;
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      align-items: end;
      padding: 0 14px 14px;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .back {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: transparent;
      color: rgba(255, 255, 255, 0.74);
      font-size: 26px;
      line-height: 1;
    }

    .title {
      align-self: center;
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.22em;
    }

    .preview-zone {
      position: absolute;
      top: 66px;
      left: 0;
      right: 0;
      z-index: 5;
      height: 258px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition:
        top 500ms var(--ease),
        height 500ms var(--ease),
        gap 500ms var(--ease);
    }

    .caption-top,
    .caption-bottom {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      transition: opacity 220ms ease, transform 300ms ease;
    }

    .sample-ring {
      position: absolute;
      top: 48%;
      left: 50%;
      width: 245px;
      height: 245px;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: opacity 260ms ease, transform 500ms var(--ease);
    }

    .photo-frame {
      position: relative;
      width: 148px;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 42%),
        repeating-linear-gradient(
          -45deg,
          rgba(255, 255, 255, 0.04) 0 8px,
          rgba(255, 255, 255, 0.018) 8px 16px
        ),
        #555b64;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      transform-origin: 50% 50%;
      transition:
        width 500ms var(--ease),
        border-radius 500ms var(--ease),
        transform 500ms var(--ease),
        opacity 260ms ease;
    }

    .photo-frame::before,
    .photo-frame::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .photo-frame::before {
      width: 62px;
      height: 62px;
      top: 28px;
      left: 26px;
    }

    .photo-frame::after {
      left: -20px;
      right: -20px;
      bottom: -18px;
      height: 78px;
      border-radius: 42px 42px 0 0;
      background: rgba(255, 255, 255, 0.1);
      transform: rotate(-6deg);
    }

    .lens-overlay {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 62px;
      z-index: 16;
      display: grid;
      gap: 8px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 340ms ease 120ms, transform 340ms var(--ease) 120ms;
      pointer-events: none;
    }

    .lens-kicker {
      color: rgba(255, 255, 255, 0.54);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
    }

    .lens-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .scanline {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 11;
      height: 2px;
      opacity: 0;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.58);
      pointer-events: none;
    }

    .done-message {
      position: absolute;
      left: 32px;
      right: 32px;
      top: 50%;
      z-index: 18;
      padding: 16px 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(15, 17, 25, 0.72);
      color: rgba(255, 255, 255, 0.88);
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 260ms ease, transform 260ms ease;
      pointer-events: none;
    }

    .lens-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      height: 488px;
      padding: 18px 18px 34px;
      overflow-y: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(
        180deg,
        rgba(17, 20, 29, 0.9),
        rgba(17, 20, 29, 0.98)
      );
      transition: transform 300ms var(--ease), opacity 300ms ease;
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      font-weight: 500;
    }

    .lens-list {
      display: grid;
      gap: 10px;
    }

    .lens-card,
    .custom-card {
      width: 100%;
      min-height: 82px;
      display: grid;
      grid-template-columns: 54px 1fr 24px;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      text-align: left;
      transition:
        border-color 160ms ease,
        background 160ms ease,
        transform 160ms ease;
    }

    .lens-card:active,
    .custom-card:active {
      transform: scale(0.985);
    }

    .lens-card.is-selected {
      border-color: var(--line-bright);
      background: var(--panel-strong);
    }

    .icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: rgba(13, 15, 22, 0.82);
      font-size: 22px;
      font-weight: 700;
    }

    .green { background: #7ba877; }
    .gray { background: #8a8f98; }
    .amber { background: #c59a4d; }
    .coral { background: #d9796b; }

    .lens-copy {
      min-width: 0;
    }

    .lens-title {
      display: block;
      margin: 0 0 5px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .lens-desc {
      display: block;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .arrow {
      color: rgba(255, 255, 255, 0.4);
      font-size: 24px;
      text-align: right;
    }

    .custom-card {
      grid-template-columns: 1fr;
      justify-items: center;
      min-height: 76px;
      margin-top: 12px;
      border-style: dashed;
      opacity: 0.55;
      text-align: center;
    }

    .custom-title {
      margin: 0 0 5px;
      color: rgba(255, 255, 255, 0.74);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .custom-note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 54px;
      z-index: 40;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      opacity: 0;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .phone.is-reading .nav {
      opacity: 0;
      transform: translateY(-12px);
      pointer-events: none;
    }

    .phone.is-reading .lens-panel {
      opacity: 0;
      transform: translateY(120%);
      pointer-events: none;
    }

    .phone.is-reading .preview-zone {
      top: 0;
      height: 812px;
      gap: 0;
    }

    .phone.is-reading .caption-top,
    .phone.is-reading .caption-bottom,
    .phone.is-reading .sample-ring {
      opacity: 0;
    }

    .phone.is-reading .sample-ring {
      transform: translate(-50%, -50%) scale(1.8);
    }

    .phone.is-reading .photo-frame {
      width: 375px;
      border-radius: 0;
      transform: scale(1.64);
      border-color: rgba(255, 255, 255, 0.04);
    }

    .phone.is-reading .lens-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .phone.is-scanning .scanline {
      opacity: 1;
      animation: scan 1150ms linear infinite;
    }

    .phone.is-done .scanline {
      opacity: 0;
      animation: none;
    }

    .phone.is-done .done-message {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      cursor: pointer;
    }

    @keyframes scan {
      from { transform: translateY(0); }
      to { transform: translateY(812px); }
    }

    @media (max-width: 430px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }

      .reset-demo {
        top: auto;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">重置演示</button>

  <main class="phone" aria-label="世界观透镜镜片选择页原型">
    <nav class="nav" aria-label="顶部导航">
      <button class="back" type="button" aria-label="返回">‹</button>
      <div class="title">选择镜片</div>
      <div aria-hidden="true"></div>
    </nav>

    <section class="preview-zone" aria-label="照片预览">
      <div class="caption-top">你的捕获</div>
      <div class="sample-ring" aria-hidden="true"></div>
      <div class="photo-frame" aria-label="照片占位图">
        <div class="scanline" aria-hidden="true"></div>
      </div>
      <div class="caption-bottom">轻触镜片，换一种方式看见</div>
      <div class="lens-overlay" aria-live="polite">
        <div class="lens-kicker">WORLDVIEW LENS</div>
        <div class="lens-name">博物学家</div>
      </div>
      <button class="done-message" type="button">解析完成 — 进入重述页</button>
    </section>

    <section class="lens-panel" aria-label="镜片列表">
      <h1 class="section-title">预设镜片</h1>
      <div class="lens-list">
        <button class="lens-card" type="button" data-lens="博物学家">
          <span class="icon green" aria-hidden="true">✦</span>
          <span class="lens-copy">
            <span class="lens-title">博物学家</span>
            <span class="lens-desc">生态标本与田野笔记</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <button class="lens-card" type="button" data-lens="都市倦怠">
          <span class="icon gray" aria-hidden="true">…</span>
          <span class="lens-copy">
            <span class="lens-title">都市倦怠</span>
            <span class="lens-desc">疲惫都市人的凝视</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <button class="lens-card" type="button" data-lens="宋代文人">
          <span class="icon amber" aria-hidden="true">文</span>
          <span class="lens-copy">
            <span class="lens-title">宋代文人</span>
            <span class="lens-desc">清供雅趣与闲适心境</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <button class="lens-card" type="button" data-lens="废墟考古">
          <span class="icon coral" aria-hidden="true">◎</span>
          <span class="lens-copy">
            <span class="lens-title">废墟考古</span>
            <span class="lens-desc">当下之物的未来化石</span>
          </span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>

        <button class="custom-card" type="button">
          <span>
            <p class="custom-title">+ 创建自定义镜片</p>
            <p class="custom-note">即将推出</p>
          </span>
        </button>
      </div>
    </section>

    <div class="toast" role="status" aria-live="polite">即将推出</div>
  </main>

  <script>
    const phone = document.querySelector(".phone");
    const lensCards = Array.from(document.querySelectorAll(".lens-card"));
    const customCard = document.querySelector(".custom-card");
    const lensName = document.querySelector(".lens-name");
    const resetDemo = document.querySelector(".reset-demo");
    const backButton = document.querySelector(".back");
    const doneMessage = document.querySelector(".done-message");
    const toast = document.querySelector(".toast");

    let timers = [];
    let toastTimer = null;

    function clearTimers() {
      timers.forEach((timer) => clearTimeout(timer));
      timers = [];
    }

    function resetState() {
      clearTimers();
      phone.classList.remove("is-reading", "is-scanning", "is-done");
      lensCards.forEach((card) => card.classList.remove("is-selected"));
      lensName.textContent = "博物学家";
      toast.classList.remove("show");
      if (toastTimer) {
        clearTimeout(toastTimer);
        toastTimer = null;
      }
    }

    function chooseLens(card) {
      resetState();
      card.classList.add("is-selected");
      lensName.textContent = card.dataset.lens;
      phone.classList.add("is-reading");

      timers.push(setTimeout(() => {
        phone.classList.add("is-scanning");
      }, 1000));

      timers.push(setTimeout(() => {
        phone.classList.remove("is-scanning");
        phone.classList.add("is-done");
      }, 3000));
    }

    function showToast() {
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1500);
    }

    lensCards.forEach((card) => {
      card.addEventListener("click", () => chooseLens(card));
    });

    customCard.addEventListener("click", showToast);
    resetDemo.addEventListener("click", resetState);
    backButton.addEventListener("click", resetState);
    doneMessage.addEventListener("click", resetState);
  </script>
</body>
</html>
