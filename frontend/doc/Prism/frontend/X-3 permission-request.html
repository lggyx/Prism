<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Permission Request</title>
  <style>
    :root {
      --bg: #0a0c10;
      --w006: rgba(255,255,255,0.06);
      --w012: rgba(255,255,255,0.12);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w045: rgba(255,255,255,0.45);
      --w06: rgba(255,255,255,0.6);
      --w085: rgba(255,255,255,0.85);
      --mono: "SF Mono", Menlo, "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w085);
      font-family: var(--mono);
    }
    button { border: 0; color: inherit; font: inherit; cursor: pointer; }
    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
    }
    .top {
      height: 46px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.94);
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.3em;
    }
    .panel {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 96px;
      bottom: 120px;
      display: grid;
      align-content: center;
      gap: 14px;
    }
    .symbol {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w012);
      border-radius: 4px;
      color: var(--w045);
      font-size: 28px;
    }
    h1 {
      margin: 4px 0 0;
      color: var(--w085);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 17px;
      font-weight: 500;
    }
    p {
      margin: 0;
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      line-height: 1.55;
    }
    .list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }
    .item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      min-height: 46px;
      padding: 8px;
      border: 1px solid var(--w006);
      border-radius: 4px;
      background: rgba(255,255,255,0.02);
      color: var(--w06);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .item span:first-child {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w012);
      border-radius: 4px;
    }
    .actions {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions button {
      height: 44px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.12em;
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 40;
      padding: 9px 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 430px) {
      body { place-items: start center; padding-top: 10px; }
      .reset-demo { top: auto; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>
  <main class="phone" aria-label="权限请求解释页">
    <header class="top"><span>PERMISSION</span><span>CAMERA</span></header>
    <section class="panel">
      <div class="symbol">⌖</div>
      <h1>需要相机权限</h1>
      <p>世界观透镜需要使用相机拍摄你正在观察的现实现场。定位只用于私人切片记录，社区展示会自动模糊。</p>
      <div class="list">
        <div class="item"><span>□</span><span>CAMERA · capture visual sample</span></div>
        <div class="item"><span>⌁</span><span>LOCATION · record private context</span></div>
        <div class="item"><span>◉</span><span>MIC · create custom lens</span></div>
      </div>
    </section>
    <footer class="actions">
      <button class="later" type="button">LATER</button>
      <button class="allow" type="button">ALLOW</button>
    </footer>
    <div class="toast" role="status" aria-live="polite"></div>
  </main>
  <script>
    const toast = document.querySelector(".toast");
    const buttons = Array.from(document.querySelectorAll("button"));
    let timer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }
    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.classList.contains("allow")) showToast("打开系统权限弹窗");
        else if (button.classList.contains("later")) showToast("稍后再说");
        else showToast("RESET COMPLETE");
      });
    });
  </script>
</body>
</html>
