<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Splash</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w006: rgba(255,255,255,0.06);
      --w012: rgba(255,255,255,0.12);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w06: rgba(255,255,255,0.6);
      --w09: rgba(255,255,255,0.9);
      --mono: "SF Mono", Menlo, "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w09);
      font-family: var(--mono);
    }
    button { border: 0; color: inherit; font: inherit; cursor: pointer; }
    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
      isolation: isolate;
    }
    .stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 18px;
      text-align: center;
    }
    .mark {
      position: relative;
      width: 92px;
      height: 92px;
      border: 1px solid var(--w012);
      border-radius: 50%;
      animation: iris 1600ms ease-in-out infinite;
    }
    .mark::before,
    .mark::after {
      content: "";
      position: absolute;
      background: var(--w012);
    }
    .mark::before {
      left: 50%;
      top: 10px;
      bottom: 10px;
      width: 1px;
      transform: translateX(-50%);
    }
    .mark::after {
      left: 10px;
      right: 10px;
      top: 50%;
      height: 1px;
      transform: translateY(-50%);
    }
    .ring {
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
    }
    @keyframes iris {
      0%, 100% { clip-path: circle(100% at 50% 50%); opacity: 0.7; }
      50% { clip-path: circle(36% at 50% 50%); opacity: 1; }
    }
    h1 {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .slogan {
      margin: 0;
      color: var(--w035);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
    }
    .meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 48px;
      color: var(--w025);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-align: center;
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 40;
      padding: 9px 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 430px) {
      body { place-items: start center; padding-top: 10px; }
      .reset-demo { top: auto; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>
  <main class="phone" aria-label="世界观透镜启动页">
    <section class="stage">
      <div class="mark" aria-hidden="true"><div class="ring"></div></div>
      <h1>世界观透镜</h1>
      <p class="slogan">换一副镜片，重新看见世界</p>
    </section>
    <div class="meta">BOOTING OPTICAL SYSTEM</div>
    <div class="toast" role="status" aria-live="polite"></div>
  </main>
  <script>
    const toast = document.querySelector(".toast");
    const reset = document.querySelector(".reset-demo");
    let timer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }
    setTimeout(() => showToast("进入登录页"), 1600);
    reset.addEventListener("click", () => showToast("RESET COMPLETE"));
  </script>
</body>
</html>
