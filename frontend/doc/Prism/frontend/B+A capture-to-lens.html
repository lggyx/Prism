<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - 取景到镜片选择</title>
  <style>
    :root {
      --bg: #0a0c10;
      --phone-bg: #0a0c10;
      --mono: "SF Mono", Menlo, "Courier New", monospace;
      --ease: cubic-bezier(0.2, 0.86, 0.26, 1);
      --w004: rgba(255,255,255,0.04);
      --w006: rgba(255,255,255,0.06);
      --w01: rgba(255,255,255,0.1);
      --w012: rgba(255,255,255,0.12);
      --w015: rgba(255,255,255,0.15);
      --w02: rgba(255,255,255,0.2);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w045: rgba(255,255,255,0.45);
      --w06: rgba(255,255,255,0.6);
      --w08: rgba(255,255,255,0.8);
      --w09: rgba(255,255,255,0.9);
      --green: #79a979;
      --gray: #8d929b;
      --amber: #c79a4d;
      --coral: #d9796b;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w09);
      font-family: var(--mono);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 80;
      padding: 8px 10px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid var(--w015);
      border-radius: 6px;
      background: var(--phone-bg);
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
      isolation: isolate;
    }

    .capture-stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 375px;
      height: 812px;
      z-index: 1;
      overflow: hidden;
      background: #11151b;
      transition:
        left 500ms var(--ease),
        top 500ms var(--ease),
        width 500ms var(--ease),
        height 500ms var(--ease),
        border-radius 500ms var(--ease),
        transform 500ms var(--ease),
        filter 500ms var(--ease);
    }

    .scene {
      position: absolute;
      inset: 0;
      clip-path: circle(120% at 50% 46%);
      background:
        radial-gradient(circle at 22% 26%, rgba(124, 164, 100, 0.65) 0 8%, transparent 21%),
        radial-gradient(circle at 66% 48%, rgba(185, 178, 145, 0.35) 0 8%, transparent 19%),
        linear-gradient(180deg, #758d9b 0 26%, #5f686d 26% 34%, #817c70 34% 42%, #394742 42% 60%, #6d6558 60% 100%);
      transform: scale(1.05);
      animation: liveDrift 9s ease-in-out infinite alternate;
      transition: clip-path 600ms var(--ease), transform 500ms var(--ease);
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 29%, rgba(52,60,58,0.72) 29% 35%, transparent 35%),
        linear-gradient(90deg, transparent 0 58%, rgba(112,110,98,0.7) 58% 74%, transparent 74%),
        repeating-linear-gradient(90deg, transparent 0 18px, rgba(255,255,255,0.02) 18px 19px);
      opacity: 0.72;
    }

    .scene::after {
      content: "";
      position: absolute;
      left: -12%;
      right: -12%;
      bottom: -4%;
      height: 34%;
      background:
        linear-gradient(14deg, transparent 0 41%, rgba(255,255,255,0.12) 41% 42%, transparent 42%),
        linear-gradient(168deg, rgba(42,45,43,0.92), rgba(112,105,92,0.94));
      transform: skewY(-5deg);
    }

    @keyframes liveDrift {
      from { transform: scale(1.05) translate3d(-4px, -2px, 0); }
      to { transform: scale(1.08) translate3d(4px, 5px, 0); }
    }

    .phone.is-capturing .scene,
    .phone.is-selection .scene,
    .phone.is-reading .scene,
    .phone.is-done .scene {
      animation-play-state: paused;
    }

    .phone.is-iris .scene {
      clip-path: circle(35% at 50% 46%);
    }

    .capture-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      transition: background 600ms var(--ease);
    }

    .phone.is-iris .capture-stage::after {
      background: rgba(0,0,0,0.58);
    }

    .phone.is-back .capture-stage {
      transform: scale(0.92);
      filter: blur(2px);
    }

    .phone.is-selection .capture-stage {
      left: 113px;
      top: 103px;
      width: 148px;
      height: 198px;
      border-radius: 16px;
      border: 1px solid var(--w015);
      filter: none;
      transform: none;
    }

    .phone.is-reading .capture-stage,
    .phone.is-done .capture-stage {
      left: 0;
      top: 0;
      width: 375px;
      height: 812px;
      border-radius: 0;
      transform: scale(1.04);
      filter: none;
      border: 0;
      transition-duration: 500ms;
    }

    .phone.is-selection .scene {
      clip-path: circle(120% at 50% 46%);
      transform: scale(1.02);
    }

    .flash {
      position: absolute;
      inset: 0;
      z-index: 50;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    .phone.is-flash .flash {
      animation: flash 180ms ease-out forwards;
    }

    @keyframes flash {
      0% { opacity: 0; }
      38% { opacity: 0.94; }
      100% { opacity: 0; }
    }

    .reticle {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      opacity: 0.18;
      transition: opacity 200ms ease;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45%;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .reticle::before {
      width: 228px;
      height: 228px;
    }

    .reticle::after {
      width: 88px;
      height: 88px;
    }

    .cross {
      position: absolute;
      left: 50%;
      top: 45%;
      width: 260px;
      height: 260px;
      transform: translate(-50%, -50%);
    }

    .cross::before,
    .cross::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.18);
    }

    .cross::before {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
    }

    .cross::after {
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .hud button {
      pointer-events: auto;
    }

    .close,
    .flash-btn {
      position: absolute;
      top: 22px;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.18);
      color: var(--w06);
      font-size: 20px;
    }

    .close { left: 18px; }
    .flash-btn { right: 18px; font-size: 13px; }

    .status-pill {
      position: absolute;
      top: 24px;
      left: 50%;
      height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.18);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.12em;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .status-pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7fbf82;
      box-shadow: 0 0 10px rgba(127,191,130,0.6);
    }

    .meta-left,
    .meta-right {
      position: absolute;
      bottom: 112px;
      color: var(--w035);
      font-size: 10px;
      line-height: 1.6;
      letter-spacing: 0.08em;
    }

    .meta-left { left: 20px; }
    .meta-right { right: 20px; text-align: right; }

    .shutter {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w02);
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      transform: translateX(-50%);
      transition: opacity 200ms ease, transform 200ms ease;
      pointer-events: auto;
    }

    .shutter::before {
      content: "";
      width: 54px;
      height: 54px;
      border: 1px solid var(--w06);
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
    }

    .phone.is-capturing .hud,
    .phone.is-selection .hud,
    .phone.is-reading .hud,
    .phone.is-done .hud,
    .phone.is-capturing .reticle,
    .phone.is-selection .reticle,
    .phone.is-reading .reticle,
    .phone.is-done .reticle {
      opacity: 0;
      pointer-events: none;
    }

    .selection-nav {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 18;
      height: 66px;
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      align-items: end;
      padding: 0 14px 14px;
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 300ms var(--ease);
    }

    .back {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--w012);
      color: var(--w06);
      font-size: 24px;
    }

    .select-title {
      align-self: center;
      margin-top: 22px;
      color: var(--w045);
      font-size: 12px;
      letter-spacing: 0.22em;
      text-align: center;
    }

    .phone.is-selection .selection-nav {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      transition-delay: 160ms;
    }

    .sample-copy {
      position: absolute;
      left: 0;
      right: 0;
      top: 78px;
      z-index: 16;
      height: 246px;
      display: grid;
      grid-template-rows: 22px 198px 24px;
      justify-items: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease;
    }

    .sample-copy span {
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .sample-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 245px;
      height: 245px;
      border: 1px dashed var(--w015);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .phone.is-selection .sample-copy {
      opacity: 1;
      transition-delay: 120ms;
    }

    .phone.is-reading .sample-copy,
    .phone.is-done .sample-copy {
      opacity: 0;
      transition-delay: 0ms;
    }

    .lens-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      height: 488px;
      padding: 18px 18px 34px;
      overflow-y: auto;
      border-top: 1px solid var(--w006);
      background: linear-gradient(180deg, rgba(10,12,16,0.92), rgba(10,12,16,0.99));
      opacity: 0;
      transform: translateY(100%);
      pointer-events: none;
      transition: opacity 400ms ease, transform 400ms var(--ease);
    }

    .phone.is-selection .lens-panel {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      transition-delay: 120ms;
    }

    .phone.is-reading .lens-panel,
    .phone.is-done .lens-panel {
      opacity: 0;
      transform: translateY(120%);
      pointer-events: none;
      transition-delay: 0ms;
      transition-duration: 300ms;
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--w045);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.12em;
    }

    .lens-list {
      display: grid;
      gap: 10px;
    }

    .lens-card,
    .custom-card {
      width: 100%;
      min-height: 82px;
      display: grid;
      grid-template-columns: 54px 1fr 24px;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.035);
      text-align: left;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .lens-card.is-selected {
      border-color: var(--w06);
      background: rgba(255,255,255,0.075);
    }

    .icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: rgba(10,12,16,0.82);
      font-size: 21px;
      font-weight: 700;
    }

    .green { background: var(--green); }
    .gray { background: var(--gray); }
    .amber { background: var(--amber); }
    .coral { background: var(--coral); }

    .lens-title {
      display: block;
      margin: 0 0 5px;
      color: var(--w08);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    .lens-desc {
      display: block;
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 12px;
      line-height: 1.35;
    }

    .arrow {
      color: var(--w035);
      font-size: 22px;
      text-align: right;
    }

    .custom-card {
      grid-template-columns: 1fr;
      justify-items: center;
      min-height: 76px;
      margin-top: 12px;
      border-style: dashed;
      opacity: 0.55;
      text-align: center;
    }

    .custom-title {
      margin: 0 0 5px;
      color: var(--w07);
      font-size: 14px;
      font-weight: 600;
    }

    .custom-note {
      margin: 0;
      color: var(--w045);
      font-size: 12px;
    }

    .reading-overlay {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 72px;
      z-index: 25;
      opacity: 0;
      transform: translateY(24px);
      pointer-events: none;
      transition: opacity 340ms ease 120ms, transform 340ms var(--ease) 120ms;
    }

    .phone.is-reading .reading-overlay,
    .phone.is-done .reading-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .reading-kicker {
      margin-bottom: 8px;
      color: var(--w045);
      font-size: 11px;
      letter-spacing: 0.18em;
    }

    .reading-name {
      color: var(--w09);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .scanline {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 28;
      height: 2px;
      opacity: 0;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 0 18px rgba(255,255,255,0.58);
      pointer-events: none;
    }

    .phone.is-scanning .scanline {
      opacity: 1;
      animation: scan 1150ms linear infinite;
    }

    @keyframes scan {
      from { transform: translateY(0); }
      to { transform: translateY(812px); }
    }

    .done-message {
      position: absolute;
      left: 32px;
      right: 32px;
      top: 50%;
      z-index: 35;
      min-height: 52px;
      padding: 16px 14px;
      border: 1px solid var(--w02);
      border-radius: 4px;
      background: rgba(10,12,16,0.74);
      color: var(--w085);
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 260ms ease, transform 260ms ease;
      pointer-events: none;
    }

    .phone.is-done .done-message {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 54px;
      z-index: 60;
      padding: 10px 14px;
      border: 1px solid var(--w015);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w08);
      font-size: 13px;
      opacity: 0;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 430px) {
      body {
        place-items: start center;
        padding-top: 10px;
      }
      .reset-demo {
        top: auto;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>

  <main class="phone" aria-label="世界观透镜取景到镜片选择流程">
    <section class="capture-stage" aria-label="取景画面">
      <div class="scene"></div>
    </section>

    <div class="reticle" aria-hidden="true"><div class="cross"></div></div>

    <section class="hud" aria-label="取景信息">
      <button class="close" type="button" aria-label="关闭">×</button>
      <div class="status-pill">WORLDVIEW LENS</div>
      <button class="flash-btn" type="button" aria-label="闪光灯">⚡</button>
      <div class="meta-left">37.7749°N 122.4194°W<br />2026.05.16</div>
      <div class="meta-right">f/1.8<br />ISO 400<br />1/60s</div>
      <button class="shutter" type="button" aria-label="快门"></button>
    </section>

    <nav class="selection-nav" aria-label="镜片选择导航">
      <button class="back" type="button" aria-label="返回取景">‹</button>
      <div class="select-title">选择镜片</div>
      <div aria-hidden="true"></div>
    </nav>

    <section class="sample-copy" aria-label="捕获提示">
      <span>你的捕获</span>
      <div class="sample-ring" aria-hidden="true"></div>
      <span>轻触镜片，换一种方式看见</span>
    </section>

    <section class="lens-panel" aria-label="镜片列表">
      <h1 class="section-title">预设镜片</h1>
      <div class="lens-list">
        <button class="lens-card" type="button" data-lens="博物学家">
          <span class="icon green" aria-hidden="true">✦</span>
          <span><span class="lens-title">博物学家</span><span class="lens-desc">生态标本与田野笔记</span></span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>
        <button class="lens-card" type="button" data-lens="都市倦怠">
          <span class="icon gray" aria-hidden="true">…</span>
          <span><span class="lens-title">都市倦怠</span><span class="lens-desc">疲惫都市人的凝视</span></span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>
        <button class="lens-card" type="button" data-lens="宋代文人">
          <span class="icon amber" aria-hidden="true">文</span>
          <span><span class="lens-title">宋代文人</span><span class="lens-desc">清供雅趣与闲适心境</span></span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>
        <button class="lens-card" type="button" data-lens="废墟考古">
          <span class="icon coral" aria-hidden="true">◎</span>
          <span><span class="lens-title">废墟考古</span><span class="lens-desc">当下之物的未来化石</span></span>
          <span class="arrow" aria-hidden="true">›</span>
        </button>
        <button class="custom-card" type="button">
          <span><p class="custom-title">+ 创建自定义镜片</p><p class="custom-note">即将推出</p></span>
        </button>
      </div>
    </section>

    <section class="reading-overlay" aria-live="polite">
      <div class="reading-kicker">WORLDVIEW LENS</div>
      <div class="reading-name">博物学家</div>
    </section>

    <div class="scanline" aria-hidden="true"></div>
    <button class="done-message" type="button">解析完成 — 进入重述页</button>
    <div class="flash" aria-hidden="true"></div>
    <div class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const phone = document.querySelector(".phone");
    const shutter = document.querySelector(".shutter");
    const back = document.querySelector(".back");
    const resetDemo = document.querySelector(".reset-demo");
    const lensCards = Array.from(document.querySelectorAll(".lens-card"));
    const customCard = document.querySelector(".custom-card");
    const readingName = document.querySelector(".reading-name");
    const doneMessage = document.querySelector(".done-message");
    const toast = document.querySelector(".toast");

    let timers = [];
    let toastTimer = null;

    function addTimer(callback, delay) {
      const timer = setTimeout(callback, delay);
      timers.push(timer);
      return timer;
    }

    function clearTimers() {
      timers.forEach((timer) => clearTimeout(timer));
      timers = [];
      if (toastTimer) {
        clearTimeout(toastTimer);
        toastTimer = null;
      }
    }

    function setState(classes) {
      phone.className = "phone";
      classes.forEach((name) => phone.classList.add(name));
    }

    function resetState() {
      clearTimers();
      setState([]);
      lensCards.forEach((card) => card.classList.remove("is-selected"));
      readingName.textContent = "博物学家";
      toast.classList.remove("show");
    }

    function captureFlow() {
      clearTimers();
      lensCards.forEach((card) => card.classList.remove("is-selected"));
      setState(["is-capturing", "is-flash"]);
      addTimer(() => phone.classList.remove("is-flash"), 190);
      addTimer(() => phone.classList.add("is-iris"), 40);
      addTimer(() => phone.classList.add("is-back"), 400);
      addTimer(() => setState(["is-selection"]), 800);
    }

    function returnToCapture() {
      clearTimers();
      setState([]);
      lensCards.forEach((card) => card.classList.remove("is-selected"));
    }

    function chooseLens(card) {
      clearTimers();
      lensCards.forEach((item) => item.classList.remove("is-selected"));
      card.classList.add("is-selected");
      readingName.textContent = card.dataset.lens;
      setState(["is-reading"]);
      card.classList.add("is-selected");

      addTimer(() => phone.classList.add("is-scanning"), 1000);
      addTimer(() => {
        phone.classList.remove("is-scanning");
        phone.classList.add("is-done");
      }, 3000);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    shutter.addEventListener("click", captureFlow);
    back.addEventListener("click", returnToCapture);
    resetDemo.addEventListener("click", resetState);
    doneMessage.addEventListener("click", resetState);
    customCard.addEventListener("click", () => showToast("即将推出"));
    lensCards.forEach((card) => card.addEventListener("click", () => chooseLens(card)));
  </script>
</body>
</html>
