<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Voice Lens Creator</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w006: rgba(255,255,255,0.06);
      --w012: rgba(255,255,255,0.12);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w045: rgba(255,255,255,0.45);
      --w06: rgba(255,255,255,0.6);
      --w085: rgba(255,255,255,0.85);
      --coral: #F0997B;
      --mono: "SF Mono", Menlo, "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w085);
      font-family: var(--mono);
    }
    button { border: 0; color: inherit; font: inherit; cursor: pointer; }
    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
    }
    .top {
      height: 58px;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      align-items: end;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.94);
    }
    .back {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 22px;
    }
    .title {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-align: center;
    }
    .content {
      position: absolute;
      inset: 58px 0 76px;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }
    .hint {
      margin: 0 0 16px;
      color: var(--w045);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      text-align: center;
    }
    .mic-zone {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 20px 0 18px;
    }
    .mic {
      position: relative;
      width: 88px;
      height: 88px;
      border: 1px solid var(--w012);
      border-radius: 50%;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 24px;
    }
    .mic.is-recording {
      border-color: rgba(240,153,123,0.6);
      box-shadow: 0 0 0 12px rgba(240,153,123,0.04), 0 0 28px rgba(240,153,123,0.12);
      color: var(--coral);
    }
    .mic-state {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.14em;
    }
    .dialog {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .msg {
      max-width: 86%;
      padding: 10px 11px;
      border: 1px solid var(--w006);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 12px;
      line-height: 1.45;
    }
    .msg.user {
      justify-self: end;
      border-color: rgba(255,255,255,0.12);
      color: var(--w085);
    }
    .draft {
      margin-top: 14px;
      padding: 12px;
      border: 1px dashed rgba(240,153,123,0.32);
      border-radius: 4px;
      background: rgba(240,153,123,0.035);
      display: none;
    }
    .draft.is-visible { display: grid; gap: 7px; }
    .draft-title {
      color: var(--w085);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }
    .draft-meta {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.12em;
    }
    .draft-desc {
      margin: 0;
      color: var(--w06);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 12px;
      line-height: 1.45;
    }
    .actions {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 76px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid var(--w006);
      background: var(--panel);
    }
    .actions button {
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.12em;
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 88px;
      z-index: 40;
      padding: 9px 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 430px) {
      body { place-items: start center; padding-top: 10px; }
      .reset-demo { top: auto; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>
  <main class="phone" aria-label="AI 语聊创建镜片">
    <header class="top">
      <button class="back" type="button" aria-label="返回">‹</button>
      <div class="title">CREATE LENS</div>
      <div></div>
    </header>
    <section class="content">
      <p class="hint">描述你想要的观察视角</p>
      <section class="mic-zone">
        <button class="mic" type="button" aria-label="语音输入">◉</button>
        <div class="mic-state">TAP TO RECORD</div>
      </section>
      <section class="dialog">
        <div class="msg">你想用什么样的视角看世界？</div>
      </section>
      <section class="draft">
        <div class="draft-title">城市考古者</div>
        <div class="draft-meta">URBAN ARCHAEOLOGIST | CUSTOM</div>
        <p class="draft-desc">把街道、招牌和裂缝看成未来遗址，寻找日常里的时间沉积。</p>
      </section>
    </section>
    <footer class="actions">
      <button class="cancel" type="button">CANCEL</button>
      <button class="done" type="button">COMPLETE</button>
    </footer>
    <div class="toast" role="status" aria-live="polite"></div>
  </main>
  <script>
    const mic = document.querySelector(".mic");
    const state = document.querySelector(".mic-state");
    const dialog = document.querySelector(".dialog");
    const draft = document.querySelector(".draft");
    const done = document.querySelector(".done");
    const cancel = document.querySelector(".cancel");
    const back = document.querySelector(".back");
    const reset = document.querySelector(".reset-demo");
    const toast = document.querySelector(".toast");
    let step = 0;
    let timer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }
    function resetState() {
      step = 0;
      mic.classList.remove("is-recording");
      state.textContent = "TAP TO RECORD";
      dialog.innerHTML = '<div class="msg">你想用什么样的视角看世界？</div>';
      draft.classList.remove("is-visible");
    }
    mic.addEventListener("click", () => {
      step += 1;
      mic.classList.toggle("is-recording");
      if (step === 1) {
        state.textContent = "RECORDING";
        showToast("录音中");
      } else {
        mic.classList.remove("is-recording");
        state.textContent = "TRANSCRIBED";
        dialog.insertAdjacentHTML("beforeend", '<div class="msg user">我想用考古学家的视角看城市。</div><div class="msg">我为你生成了一枚镜片草稿。</div>');
        draft.classList.add("is-visible");
      }
    });
    done.addEventListener("click", () => showToast(draft.classList.contains("is-visible") ? "镜片已创建" : "请先描述视角"));
    cancel.addEventListener("click", () => showToast("返回镜片选择"));
    back.addEventListener("click", () => showToast("返回镜片选择"));
    reset.addEventListener("click", () => { resetState(); showToast("RESET COMPLETE"); });
  </script>
</body>
</html>
