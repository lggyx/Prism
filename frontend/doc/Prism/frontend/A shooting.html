<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - 快门过渡动效</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --glass: rgba(255, 255, 255, 0.1);
      --line: rgba(255, 255, 255, 0.16);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.58);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(56, 68, 78, 0.28), transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border-radius: 42px;
      background: #050505;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 34px 110px rgba(0, 0, 0, 0.78),
        0 0 0 10px rgba(255, 255, 255, 0.035);
      isolation: isolate;
    }

    .notch {
      position: absolute;
      top: 12px;
      left: 50%;
      z-index: 20;
      width: 112px;
      height: 31px;
      transform: translateX(-50%);
      border-radius: 0 0 18px 18px;
      background: rgba(0, 0, 0, 0.9);
    }

    .stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.88)),
        radial-gradient(circle at 58% 36%, #a9bfba 0 9%, transparent 27%),
        linear-gradient(150deg, #46594f 0%, #1f2a28 42%, #151719 64%, #34302b 100%);
    }

    .photo {
      position: absolute;
      inset: 0;
      transform-origin: 50% 48%;
      clip-path: circle(100% at 50% 48%);
      will-change: clip-path, transform, filter;
    }

    .view {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(9, 11, 13, 0.08), rgba(5, 5, 5, 0.22) 62%, rgba(5, 5, 5, 0.76)),
        radial-gradient(circle at 24% 25%, rgba(238, 224, 178, 0.78) 0 6%, transparent 16%),
        radial-gradient(circle at 66% 44%, rgba(160, 196, 184, 0.76) 0 7%, transparent 19%),
        linear-gradient(118deg, #738675 0 18%, #2f4b43 18% 40%, #182420 40% 62%, #514738 62% 100%);
      transform: scale(1.04);
      animation: liveDrift 8s ease-in-out infinite alternate;
    }

    .view::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.42;
      background:
        repeating-linear-gradient(90deg, transparent 0 11px, rgba(255, 255, 255, 0.018) 11px 12px),
        repeating-linear-gradient(0deg, transparent 0 13px, rgba(0, 0, 0, 0.03) 13px 14px);
      mix-blend-mode: overlay;
    }

    .view::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -3%;
      height: 36%;
      background:
        radial-gradient(ellipse at 25% 82%, rgba(20, 28, 21, 0.9) 0 18%, transparent 42%),
        linear-gradient(172deg, transparent 0 18%, rgba(20, 28, 20, 0.82) 19% 100%);
    }

    @keyframes liveDrift {
      from { transform: scale(1.04) translate3d(-5px, -3px, 0); }
      to { transform: scale(1.08) translate3d(5px, 5px, 0); }
    }

    .reticle {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0.28;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 44%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .reticle::before {
      width: 230px;
      height: 230px;
      box-shadow: 0 0 0 62px rgba(255, 255, 255, 0.035);
    }

    .reticle::after {
      width: 86px;
      height: 86px;
    }

    .crosshair {
      position: absolute;
      left: 50%;
      top: 44%;
      width: 260px;
      height: 260px;
      transform: translate(-50%, -50%);
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.22);
    }

    .crosshair::before {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
    }

    .crosshair::after {
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
    }

    .hud {
      position: absolute;
      left: 22px;
      right: 22px;
      top: 60px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.68);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 220ms ease;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d8f5d1;
      box-shadow: 0 0 18px #d8f5d1;
    }

    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      height: 172px;
      display: grid;
      place-items: center;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.48) 32%, rgba(0, 0, 0, 0.82));
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .shutter {
      width: 76px;
      height: 76px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .shutter::before {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .shutter:hover {
      transform: scale(1.04);
      border-color: rgba(255, 255, 255, 0.86);
    }

    .reset {
      position: absolute;
      top: 58px;
      right: 20px;
      z-index: 30;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 8px 12px;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      cursor: pointer;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms ease, background 160ms ease;
    }

    .reset:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .lens-tray {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      z-index: 25;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 0 22px 10px;
      opacity: 0;
      transform: translateY(40px);
      pointer-events: none;
      scrollbar-width: none;
    }

    .lens-tray::-webkit-scrollbar {
      display: none;
    }

    .lens-card {
      flex: 0 0 auto;
      min-width: 116px;
      height: 74px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      color: rgba(255, 255, 255, 0.9);
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05)),
        rgba(8, 10, 12, 0.48);
      backdrop-filter: blur(18px) saturate(135%);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.02em;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .lens-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.34);
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08)),
        rgba(18, 22, 25, 0.58);
    }

    .lens-card span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.12em;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .capture-flash {
      position: absolute;
      inset: 0;
      z-index: 40;
      background: white;
      opacity: 0;
      pointer-events: none;
    }

    .phone.captured .view {
      animation-play-state: paused;
    }

    .phone.captured .controls {
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
    }

    .phone.captured .hud {
      opacity: 0;
    }

    .phone.captured .capture-flash {
      animation: flash 180ms ease-out;
    }

    .phone.captured .photo {
      animation:
        irisClose 600ms var(--ease) forwards,
        pullBack 400ms var(--ease) 400ms forwards;
    }

    .phone.captured .lens-tray {
      pointer-events: auto;
      animation: trayIn 600ms var(--ease) 600ms forwards;
    }

    .phone.captured .reset {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      transition-delay: 900ms;
    }

    @keyframes flash {
      0% { opacity: 0; }
      18% { opacity: 0.28; }
      100% { opacity: 0; }
    }

    @keyframes irisClose {
      from { clip-path: circle(100% at 50% 48%); }
      to { clip-path: circle(35% at 50% 48%); }
    }

    @keyframes pullBack {
      from { transform: scale(1); filter: blur(0); }
      to { transform: scale(0.92); filter: blur(2px); }
    }

    @keyframes trayIn {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
    }

  </style>
</head>
<body>
  <main class="phone" id="phone" aria-label="世界观透镜拍照页过渡动效演示">
    <div class="notch" aria-hidden="true"></div>

    <section class="stage">
      <div class="photo">
        <div class="view" aria-hidden="true"></div>
      </div>

      <div class="reticle" aria-hidden="true">
        <div class="crosshair"></div>
      </div>

      <div class="hud">
        <div class="status"><span class="dot"></span>Worldview Lens</div>
        <div>ISO 400 · 1/120</div>
      </div>

      <div class="controls">
        <button class="shutter" id="shutter" type="button" aria-label="按下快门"></button>
      </div>

      <div class="lens-tray" id="lensTray" aria-label="选择世界观镜片">
        <button class="lens-card" type="button" data-lens="博物学家">博物学家<span>Naturalist</span></button>
        <button class="lens-card" type="button" data-lens="都市倦怠">都市倦怠<span>Urban Fatigue</span></button>
        <button class="lens-card" type="button" data-lens="宋代文人">宋代文人<span>Song Scholar</span></button>
        <button class="lens-card" type="button" data-lens="经济学家">经济学家<span>Economist</span></button>
        <button class="lens-card" type="button" data-lens="废墟考古">废墟考古<span>Ruin Archive</span></button>
      </div>

      <button class="reset" id="reset" type="button">重置</button>
      <div class="capture-flash" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const phone = document.getElementById("phone");
    const shutter = document.getElementById("shutter");
    const reset = document.getElementById("reset");
    const lensTray = document.getElementById("lensTray");

    let readyForLens = false;

    function capture() {
      if (phone.classList.contains("captured")) return;
      readyForLens = false;
      phone.classList.add("captured");

      window.setTimeout(() => {
        readyForLens = true;
      }, 1200);
    }

    function resetDemo() {
      phone.classList.remove("captured");
      readyForLens = false;
    }

    shutter.addEventListener("click", capture);
    reset.addEventListener("click", resetDemo);

    lensTray.addEventListener("click", (event) => {
      const card = event.target.closest(".lens-card");
      if (!card || !readyForLens) return;
      console.log(`选中的世界观：${card.dataset.lens}`);
    });
  </script>
</body>
</html>
