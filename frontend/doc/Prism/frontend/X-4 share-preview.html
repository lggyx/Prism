<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界观透镜 - Share Preview</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #0d0f14;
      --w006: rgba(255,255,255,0.06);
      --w012: rgba(255,255,255,0.12);
      --w025: rgba(255,255,255,0.25);
      --w035: rgba(255,255,255,0.35);
      --w045: rgba(255,255,255,0.45);
      --w06: rgba(255,255,255,0.6);
      --w085: rgba(255,255,255,0.85);
      --green: #5DCAA5;
      --mono: "SF Mono", Menlo, "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--w085);
      font-family: var(--mono);
    }
    button { border: 0; color: inherit; font: inherit; cursor: pointer; }
    .reset-demo {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background:
        linear-gradient(var(--w006) 1px, transparent 1px),
        linear-gradient(90deg, var(--w006) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.52);
    }
    .top {
      height: 58px;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      align-items: end;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--w006);
      background: rgba(10,12,16,0.94);
    }
    .back {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 22px;
    }
    .title {
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-align: center;
    }
    .preview {
      position: absolute;
      left: 34px;
      right: 34px;
      top: 86px;
      bottom: 154px;
      padding: 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
    }
    .photo {
      position: relative;
      height: 360px;
      border: 1px solid var(--w006);
      border-radius: 4px;
      background:
        radial-gradient(circle at 24% 24%, rgba(255,255,255,0.16), transparent 24%),
        linear-gradient(145deg, #355f63, #203c3b 50%, #121d20);
      overflow: hidden;
    }
    .note {
      position: absolute;
      left: 166px;
      top: 82px;
      color: rgba(255,255,255,0.76);
      font-size: 10px;
    }
    .note::before {
      content: "";
      position: absolute;
      left: -44px;
      top: 7px;
      width: 36px;
      height: 1px;
      background: rgba(255,255,255,0.58);
      transform: rotate(-18deg);
    }
    .summary {
      margin: 12px 0 0;
      color: var(--w085);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      line-height: 1.45;
    }
    .meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--w035);
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
    }
    .watermark {
      position: absolute;
      left: 12px;
      bottom: 10px;
      color: rgba(255,255,255,0.18);
      font-size: 9px;
      letter-spacing: 0.18em;
    }
    .actions {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 22px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .actions button {
      height: 46px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 86px;
      z-index: 40;
      padding: 9px 12px;
      border: 1px solid var(--w012);
      border-radius: 4px;
      background: rgba(0,0,0,0.76);
      color: var(--w06);
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translate(-50%, 10px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 430px) {
      body { place-items: start center; padding-top: 10px; }
      .reset-demo { top: auto; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <button class="reset-demo" type="button">RESET</button>
  <main class="phone" aria-label="切片分享导出预览页">
    <header class="top">
      <button class="back" type="button">‹</button>
      <div class="title">EXPORT PREVIEW</div>
      <div></div>
    </header>
    <section class="preview">
      <div class="photo"><span class="note">FIELD NOTE</span></div>
      <p class="summary">街角的日常，也有被看见的价值。</p>
      <div class="meta"><span class="dot"></span><span>博物学家 | 05.16 | 上海 · 上海</span></div>
      <div class="watermark">WORLDVIEW LENS</div>
    </section>
    <footer class="actions">
      <button type="button" data-action="SAVE IMAGE">SAVE IMAGE</button>
      <button type="button" data-action="WECHAT">WECHAT</button>
      <button type="button" data-action="MORE">MORE</button>
    </footer>
    <div class="toast" role="status" aria-live="polite"></div>
  </main>
  <script>
    const toast = document.querySelector(".toast");
    const buttons = Array.from(document.querySelectorAll("button"));
    let timer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }
    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        showToast(button.dataset.action || (button.classList.contains("back") ? "返回收藏页" : "RESET COMPLETE"));
      });
    });
  </script>
</body>
</html>
